    @media print{
      #fin-app-root, #fa-toast{ display:none !important; }
      #fa-informe-container{ display:block !important; position:static !important; left:0 !important; }
    }
    .fa-loading, .fa-error{ padding:60px 20px; text-align:center; color:var(--muted); font-size:14px; }
    .fa-hint{ font-size:11.5px; color:var(--muted); margin-top:8px; }
    .fa-section-note{ font-size:12px; color:var(--muted); margin-bottom:14px; }
    @media (max-width:760px){
      #fin-app-root{ flex-direction:column; }
      .fa-sidebar{ width:100%; flex-direction:row; overflow-x:auto; padding:12px; align-items:center; }
      .fa-brand{ padding:0 10px 0 0; }
      .fa-sidebar-footer{ display:none; }
      .fa-main{ max-height:none; }
      .fa-kpi-grid{ grid-template-columns:repeat(2,1fr); }
    }
  </style>
</head>

<!-- Módulos de Firebase para conectar a Realtime Database -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGmQuEXsFAdypuUPSxbLWQLyqwEjYXqRk",
    authDomain: "finanzasuneq.firebaseapp.com",
    databaseURL: "https://finanzasuneq-default-rtdb.firebaseio.com",
    projectId: "finanzasuneq",
    storageBucket: "finanzasuneq.firebasestorage.app",
    messagingSenderId: "437380582204",
    appId: "1:437380582204:web:0dd879f1ecc93074b6ac39",
    measurementId: "G-HTT52NHPNP"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window.storage = {
    async get(key) {
      try {
        const snapshot = await get(ref(db, key));
        if (snapshot.exists()) {
          return { value: JSON.stringify(snapshot.val()) };
        }
        return null;
      } catch (err) {
        console.error("Error al leer desde Firebase DB:", err);
        return null;
      }
    },
    async set(key, valueStr) {
      try {
        const parsed = JSON.parse(valueStr);
        await set(ref(db, key), parsed);
        return true;
      } catch (err) {
        console.error("Error al escribir en Firebase DB:", err);
        return false;
      }
    }
  };

  window.dispatchEvent(new Event('firebase-ready'));
</script>

    function todayISO(){
      const d = new Date();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${d.getFullYear()}-${m}-${day}`;
    }

    function uid(prefix){
      return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
    }

    function fmtMoney(n){
      const v = Math.round(Number(n)||0);
      const sign = v < 0 ? '-' : '';
      return sign + '$' + Math.abs(v).toLocaleString('es-CL');
    }

    function fmtMoneyC(n){
      const text = fmtMoney(n);
      return Number(n) < 0 ? `<span style="color:var(--expense)">${text}</span>` : text;
    }

    function fmtPct(n){
      if (!isFinite(n)) n = 0;
      return (n*100).toLocaleString('es-CL', {minimumFractionDigits:1, maximumFractionDigits:1}) + '%';
    }

    function fmtPctC(n){
      const text = fmtPct(n);
      return (isFinite(n) && n < 0) ? `<span style="color:var(--expense)">${text}</span>` : text;
    }

    function fmtDate(iso){
      if(!iso) return '';
      const [y,m,d] = iso.split('-');
      return `${d}-${m}-${y}`;
    }

    function escapeHtml(str){
      if (str === undefined || str === null) return '';
      return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    function showToast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 2800);
    }

    async function loadKey(key, fallback){
      try {
        const res = await window.storage.get(key);
        return res && res.value ? JSON.parse(res.value) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    async function saveKey(key, value){
      try {
        const res = await window.storage.set(key, JSON.stringify(value));
        return res;
      } catch (e) {
        console.error(`Error guardando ${key}:`, e);
        showToast('Error al conectar con la base de datos');
        return false;
      }
    }

    async function loadKeySeeded(key, seedValue){
      try {
        const res = await window.storage.get(key);
        if (res && res.value) {
          return JSON.parse(res.value);
        }
        await saveKey(key, seedValue);
        return seedValue;
      } catch (e) {
        return seedValue;
      }
    }

    async function init(){
      try {
        const config = await loadKeySeeded('config', SEED_CONFIG);
        const ingresos = await loadKeySeeded('ingresos', []);
        const gastos = await loadKeySeeded('gastos', []);
        const pagosFijosCatalogo = await loadKeySeeded('pagosFijosCatalogo', []);
        const pagosFijosEstado = await loadKeySeeded('pagosFijosEstado', {});

        state.config = config || SEED_CONFIG;
        state.ingresos = ingresos || [];
        state.gastos = gastos || [];
        state.pagosFijosCatalogo = pagosFijosCatalogo || [];
        state.pagosFijosEstado = pagosFijosEstado || {};
        state.loading = false;
      } catch (e) {
        console.error(e);
        state.error = 'No se pudieron cargar tus datos desde Firebase. Revisa tu conexión.';
        state.loading = false;
      }
      render();
    }

    function getSaldoActual(){
      const ingresosPagados = state.ingresos.filter(i=>i.estado==='Pagado').reduce((s,i)=>s+(Number(i.monto)||0),0);
      const totalGastos = state.gastos.reduce((s,g)=>s+(Number(g.monto)||0),0);
      return (Number(state.config.saldoInicial)||0) + ingresosPagados - totalGastos;
    }

    function getYearsWithData(){
      const years = new Set();
      for(let y=2021; y<=2030; y++) years.add(y);
      if(state.config) years.add(state.config.anio);
      years.add(new Date().getFullYear());
      state.ingresos.forEach(i => { if(i.fecha) years.add(new Date(i.fecha+'T00:00:00').getFullYear()); });
      state.gastos.forEach(g => { if(g.fecha) years.add(new Date(g.fecha+'T00:00:00').getFullYear()); });
      return Array.from(years).sort((a,b)=>a-b);
    }

    function getMonthlyStats(year){
      const months = Array.from({length:12}, (_,i)=>({
        mes:i, ingresosCobrados:0, ingresosTotales:0, gastosPagados:0, gastosPorCategoria:{}
      }));
      if(state.config && state.config.categoriasGastos){
        state.config.categoriasGastos.forEach(cat=> months.forEach(m=> m.gastosPorCategoria[cat]=0));
      }

      state.ingresos.forEach(ing=>{
        if(!ing.fecha) return;
        const d = new Date(ing.fecha+'T00:00:00');
        if(d.getFullYear() !== year) return;
        const m = d.getMonth();
        const monto = Number(ing.monto)||0;
        months[m].ingresosTotales += monto;
        if(ing.estado === 'Pagado') months[m].ingresosCobrados += monto;
      });

      state.gastos.forEach(g=>{
        if(!g.fecha) return;
        const d = new Date(g.fecha+'T00:00:00');
        if(d.getFullYear() !== year) return;
        const m = d.getMonth();
        const monto = Number(g.monto)||0;
        months[m].gastosPagados += monto;
        if(months[m].gastosPorCategoria[g.categoria] === undefined) months[m].gastosPorCategoria[g.categoria]=0;
        months[m].gastosPorCategoria[g.categoria] += monto;
      });

      let saldo = Number(state.config ? state.config.saldoInicial : 0)||0;
      months.forEach(m=>{
        m.saldoInicial = saldo;
        m.saldoFinal = saldo + m.ingresosCobrados - m.gastosPagados;
        saldo = m.saldoFinal;
        m.utilidadNeta = m.ingresosTotales - m.gastosPagados;
        m.margen = m.ingresosTotales !== 0 ? m.utilidadNeta / m.ingresosTotales : 0;
      });
      return months;
    }

    function sortRowsGeneric(rows, key, dir){
      const mult = dir === 'asc' ? 1 : -1;
      return rows.slice().sort((a,b)=>{
        let va = a[key], vb = b[key];
        if(typeof va === 'number' || typeof vb === 'number'){
          va = Number(va)||0; vb = Number(vb)||0;
        } else {
          va = (va||'').toString().toLowerCase();
          vb = (vb||'').toString().toLowerCase();
        }
        if(va < vb) return -1*mult;
        if(va > vb) return 1*mult;
        return 0;
      });
    }

    function yearSelect(name){
      const years = getYearsWithData();
      return `<select class="fa-year-select" data-action="change-anio" data-name="${name}">
        ${years.map(y=>`<option value="${y}" ${y===state.config.anio?'selected':''}>${y}</option>`).join('')}
      </select>`;
    }

    function renderSidebar(){
      const tabs = [
        {id:'resumen', label:'Resumen', icon:'&#9673;'},
        {id:'ingresos', label:'Ingresos', icon:'&#8593;'},
        {id:'gastos', label:'Gastos', icon:'&#8595;'},
        {id:'pagosfijos', label:'Pagos Fijos', icon:'&#8987;'},
        {id:'flujo', label:'Flujo de Caja', icon:'&#8646;'},
        {id:'rentabilidad', label:'Rentabilidad', icon:'&#9636;'},
        {id:'config', label:'Configuración', icon:'&#9881;'}
      ];
      return `
        <div class="fa-sidebar">
          <div class="fa-brand"><span class="dot"></span> Finanzas UNEQ</div>
          ${tabs.map(t=>`
            <button class="fa-nav-btn ${state.activeTab===t.id?'active':''}" data-action="nav" data-tab="${t.id}">
              <span class="fa-nav-icon">${t.icon}</span>${t.label}
            </button>
          `).join('')}
          <div class="fa-sidebar-footer">Sincronizado con Firebase</div>
        </div>
      `;
    }

    function render(){
      if(state.loading){
        root.innerHTML = `<div class="fa-loading">Cargando tus datos desde Firebase…</div>`;
        return;
      }
      if(state.error){
        root.innerHTML = `<div class="fa-error">${escapeHtml(state.error)}</div>`;
        return;
      }
      root.innerHTML = `
        ${renderSidebar()}
        <div class="fa-main">${renderTab()}</div>
      `;
    }

    function renderTab(){
      switch(state.activeTab){
        case 'resumen': return renderResumen();
        case 'ingresos': return renderIngresos();
        case 'gastos': return renderGastos();
        case 'pagosfijos': return renderPagosFijos();
        case 'flujo': return renderFlujo();
        case 'rentabilidad': return renderRentabilidad();
        case 'config': return renderConfig();
        default: return renderResumen();
      }
    }

    function renderResumen(){
      const months = getMonthlyStats(state.config.anio);
      const ingresosAnio = months.reduce((s,m)=>s+m.ingresosTotales,0);
      const gastosAnio = months.reduce((s,m)=>s+m.gastosPagados,0);
      const utilidadAnio = ingresosAnio - gastosAnio;
      const margenAnio = ingresosAnio !== 0 ? utilidadAnio/ingresosAnio : 0;
      const saldoActual = getSaldoActual();

      return `
        <div class="fa-topbar">
          <div>
            <h1>Resumen Financiero</h1>
            <div class="fa-sub">Vista general de tu empresa — año ${state.config.anio}</div>
          </div>
          ${yearSelect('resumen')}
        </div>

        <div class="fa-kpi-grid">
          <div class="fa-kpi income"><div class="fa-kpi-label">Ingresos del año</div><div class="fa-kpi-value income money">${fmtMoneyC(ingresosAnio)}</div></div>
          <div class="fa-kpi expense"><div class="fa-kpi-label">Gastos del año</div><div class="fa-kpi-value expense money">${fmtMoneyC(gastosAnio)}</div></div>
          <div class="fa-kpi"><div class="fa-kpi-label">Utilidad neta</div><div class="fa-kpi-value money">${fmtMoneyC(utilidadAnio)}</div></div>
          <div class="fa-kpi"><div class="fa-kpi-label">Margen neto</div><div class="fa-kpi-value">${fmtPctC(margenAnio)}</div></div>
          <div class="fa-kpi"><div class="fa-kpi-label">Saldo de caja actual</div><div class="fa-kpi-value money">${fmtMoneyC(saldoActual)}</div></div>
        </div>

        <div class="fa-card">
          <div class="fa-card-title">Detalle mensual ${state.config.anio}</div>
          <div class="fa-table-wrap">
            <table class="fa-table">
              <thead><tr><th>Mes</th><th class="num">Ingresos</th><th class="num">Gastos</th><th class="num">Utilidad</th><th class="num">Margen</th><th class="num">Saldo Caja</th></tr></thead>
              <tbody>
                ${months.map((m,i)=>`
                  <tr>
                    <td>${MESES[i]}</td>
                    <td class="num money">${fmtMoneyC(m.ingresosTotales)}</td>
                    <td class="num money">${fmtMoneyC(m.gastosPagados)}</td>
                    <td class="num money">${fmtMoneyC(m.utilidadNeta)}</td>
                    <td class="num">${fmtPctC(m.margen)}</td>
                    <td class="num money">${fmtMoneyC(m.saldoFinal)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderIngresos(){
      const delAnio = state.ingresos.filter(i=> i.fecha && new Date(i.fecha+'T00:00:00').getFullYear()===state.config.anio);
      return `
        <div class="fa-topbar">
          <div><h1>Ingresos (${delAnio.length})</h1><div class="fa-sub">Mostrando año ${state.config.anio}</div></div>
          ${yearSelect('ingresos')}
        </div>
        <div class="fa-card">
          <div class="fa-card-title">Registrar Nuevo Ingreso</div>
          <div class="fa-form-grid" data-form="ingreso">
            <div class="fa-field"><label>Fecha</label><input type="date" name="fecha" value="${todayISO()}"></div>
            <div class="fa-field"><label>Cliente</label><input type="text" name="cliente" placeholder="Nombre cliente"></div>
            <div class="fa-field"><label>Descripción</label><input type="text" name="descripcion" placeholder="Detalle"></div>
            <div class="fa-field"><label>Categoría</label><select name="categoria">${state.config.categoriasIngresos.map(c=>`<option>${escapeHtml(c)}</option>`).join('')}</select></div>
            <div class="fa-field"><label>Monto ($)</label><input type="number" name="monto" placeholder="0"></div>
            <div class="fa-field"><label>Estado</label><select name="estado"><option>Pagado</option><option>Pendiente</option></select></div>
          </div>
          <div class="fa-form-actions"><button type="button" class="fa-btn fa-btn-primary" data-action="submit-ingreso">Guardar Ingreso</button></div>
        </div>
        <div class="fa-card">
          <div class="fa-table-wrap">
            <table class="fa-table">
              <thead><tr><th>Fecha</th><th>Cliente</th><th>Descripción</th><th>Categoría</th><th class="num">Monto</th><th>Estado</th></tr></thead>
              <tbody>
                ${delAnio.map(i=>`
                  <tr class="income-row">
                    <td>${fmtDate(i.fecha)}</td>
                    <td>${escapeHtml(i.cliente)||'—'}</td>
                    <td>${escapeHtml(i.descripcion)||'—'}</td>
                    <td>${escapeHtml(i.categoria)}</td>
                    <td class="num money">${fmtMoneyC(i.monto)}</td>
                    <td><span class="fa-badge ${i.estado==='Pagado'?'pagado':'pendiente'}">${i.estado}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderGastos(){
      const delAnio = state.gastos.filter(g=> g.fecha && new Date(g.fecha+'T00:00:00').getFullYear()===state.config.anio);
      return `
        <div class="fa-topbar">
          <div><h1>Gastos (${delAnio.length})</h1><div class="fa-sub">Mostrando año ${state.config.anio}</div></div>
          ${yearSelect('gastos')}
        </div>
        <div class="fa-card">
          <div class="fa-card-title">Registrar Nuevo Gasto</div>
          <div class="fa-form-grid" data-form="gasto">
            <div class="fa-field"><label>Fecha</label><input type="date" name="fecha" value="${todayISO()}"></div>
            <div class="fa-field"><label>Proveedor</label><input type="text" name="proveedor" placeholder="Proveedor"></div>
            <div class="fa-field"><label>Descripción</label><input type="text" name="descripcion" placeholder="Detalle"></div>
            <div class="fa-field"><label>Categoría</label><select name="categoria">${state.config.categoriasGastos.map(c=>`<option>${escapeHtml(c)}</option>`).join('')}</select></div>
            <div class="fa-field"><label>Monto ($)</label><input type="number" name="monto" placeholder="0"></div>
            <div class="fa-field"><label>Método de Pago</label><select name="metodo">${state.config.metodosPago.map(m=>`<option>${escapeHtml(m)}</option>`).join('')}</select></div>
          </div>
          <div class="fa-form-actions"><button type="button" class="fa-btn fa-btn-primary" data-action="submit-gasto">Guardar Gasto</button></div>
        </div>
        <div class="fa-card">
          <div class="fa-table-wrap">
            <table class="fa-table">
              <thead><tr><th>Fecha</th><th>Proveedor</th><th>Descripción</th><th>Categoría</th><th class="num">Monto</th><th>Método</th></tr></thead>
              <tbody>
                ${delAnio.map(g=>`
                  <tr class="expense-row">
                    <td>${fmtDate(g.fecha)}</td>
                    <td>${escapeHtml(g.proveedor)||'—'}</td>
                    <td>${escapeHtml(g.descripcion)||'—'}</td>
                    <td>${escapeHtml(g.categoria)}</td>
                    <td class="num money">${fmtMoneyC(g.monto)}</td>
                    <td>${escapeHtml(g.metodo)||'—'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderPagosFijos(){
      return `<div class="fa-topbar"><h1>Pagos Fijos</h1></div><div class="fa-card"><p>Compromisos recurrentes sincronizados con Firebase.</p></div>`;
    }

    function renderFlujo(){
      const months = getMonthlyStats(state.config.anio);
      return `
        <div class="fa-topbar"><div><h1>Flujo de Caja</h1></div>${yearSelect('flujo')}</div>
        <div class="fa-card">
          <div class="fa-table-wrap">
            <table class="fa-table">
              <thead><tr><th>Mes</th><th class="num">Saldo Inicial</th><th class="num">(+) Cobrado</th><th class="num">(-) Pagado</th><th class="num">(=) Saldo Final</th></tr></thead>
              <tbody>
                ${months.map((m,i)=>`
                  <tr>
                    <td>${MESES[i]}</td>
                    <td class="num money">${fmtMoneyC(m.saldoInicial)}</td>
                    <td class="num money" style="color:var(--income)">${fmtMoneyC(m.ingresosCobrados)}</td>
                    <td class="num money" style="color:var(--expense)">${fmtMoneyC(m.gastosPagados)}</td>
                    <td class="num money" style="font-weight:700">${fmtMoneyC(m.saldoFinal)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderRentabilidad(){
      const months = getMonthlyStats(state.config.anio);
      return `
        <div class="fa-topbar"><div><h1>Rentabilidad</h1></div>${yearSelect('rentabilidad')}</div>
        <div class="fa-card">
          <div class="fa-table-wrap">
            <table class="fa-table">
              <thead><tr><th>Mes</th><th class="num">Ingresos</th><th class="num">Gastos</th><th class="num">Utilidad Neta</th><th class="num">Margen %</th></tr></thead>
              <tbody>
                ${months.map((m,i)=>`
                  <tr>
                    <td>${MESES[i]}</td>
                    <td class="num money">${fmtMoneyC(m.ingresosTotales)}</td>
                    <td class="num money">${fmtMoneyC(m.gastosPagados)}</td>
                    <td class="num money">${fmtMoneyC(m.utilidadNeta)}</td>
                    <td class="num">${fmtPctC(m.margen)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;
    }

    function renderConfig(){
      return `
        <div class="fa-topbar"><h1>Configuración</h1></div>
        <div class="fa-card">
          <div class="fa-field" style="max-width:260px;">
            <label>Saldo Inicial de Caja ($)</label>
            <input type="number" id="cfg-saldo-inicial" value="${state.config.saldoInicial}">
          </div>
          <div class="fa-form-actions"><button type="button" class="fa-btn fa-btn-primary" data-action="submit-config">Guardar Configuración</button></div>
        </div>
      `;
    }

    root.addEventListener('click', async (e)=>{
      const btn = e.target.closest('[data-action]');
      if(!btn) return;
      const action = btn.dataset.action;

      if(action === 'nav'){
        state.activeTab = btn.dataset.tab;
        render();
      }
      else if(action === 'submit-ingreso'){
        const container = root.querySelector('[data-form="ingreso"]');
        const inputs = container.querySelectorAll('input, select');
        const data = {};
        inputs.forEach(i=> data[i.name] = i.value);
        if(!data.monto || Number(data.monto) <= 0){ showToast('Ingresa un monto válido.'); return; }
        
        data.id = uid('ing');
        data.monto = Number(data.monto);
        state.ingresos.push(data);
        await saveKey('ingresos', state.ingresos);
        showToast('Ingreso guardado en Firebase');
        render();
      }
      else if(action === 'submit-gasto'){
        const container = root.querySelector('[data-form="gasto"]');
        const inputs = container.querySelectorAll('input, select');
        const data = {};
        inputs.forEach(i=> data[i.name] = i.value);
        if(!data.monto || Number(data.monto) <= 0){ showToast('Ingresa un monto válido.'); return; }
        
        data.id = uid('gas');
        data.monto = Number(data.monto);
        state.gastos.push(data);
        await saveKey('gastos', state.gastos);
        showToast('Gasto guardado en Firebase');
        render();
      }
      else if(action === 'submit-config'){
        const val = Number(document.getElementById('cfg-saldo-inicial').value)||0;
        state.config.saldoInicial = val;
        await saveKey('config', state.config);
        showToast('Configuración guardada en Firebase');
        render();
      }
    });

    root.addEventListener('change', async (e)=>{
      if(e.target.dataset.action === 'change-anio'){
        state.config.anio = Number(e.target.value);
        await saveKey('config', state.config);
        render();
      }
    });

    init();
  })();
});
</script>
</body>
</html>
