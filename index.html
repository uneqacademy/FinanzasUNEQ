  // ---------------- Importar CSV (Ingresos / Gastos masivos desde Excel) ----------------
  function parseCsv(text){
    if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // quitar BOM si el CSV lo trae (típico de Excel)
    const firstLine = (text.split(/\r?\n/)[0]) || '';
    const delim = (firstLine.split(';').length >= firstLine.split(',').length) ? ';' : ',';
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i=0; i<text.length; i++){
      const c = text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else {
        if(c === '"') inQuotes = true;
        else if(c === delim){ row.push(field); field=''; }
        else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else if(c === '\r'){ /* ignorar */ }
        else field += c;
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => r.length>1 || (r.length===1 && r[0] && r[0].trim()!==''));
  }

  function normalizeHeader(h){
    return (h||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  }

  // Excel en Windows a veces exporta CSV en Windows-1252 (ANSI) en vez de UTF-8. Si al leer como UTF-8
  // aparecen los patrones típicos de texto mal decodificado (mojibake) o el carácter de reemplazo "�",
  // se vuelve a leer el mismo archivo como Windows-1252, que es lo que casi siempre soluciona el problema.
  async function readFileSmartEncoding(file){
    const buffer = await file.arrayBuffer();

    // Si el archivo no es texto real (por ejemplo, es un .xlsx/.xls renombrado a .csv por error),
    // los primeros bytes no van a parecer texto plano — avisamos en vez de mostrar basura.
    const head = new Uint8Array(buffer.slice(0, 8));
    const looksBinary = (head[0]===0x50 && head[1]===0x4B) /* PK.. = zip/xlsx */
      || (head[0]===0xD0 && head[1]===0xCF) /* OLE = xls viejo */;
    if(looksBinary){
      throw new Error('El archivo no parece ser un CSV de texto (parece un Excel .xls/.xlsx renombrado). Vuelve a exportarlo como CSV desde Excel.');
    }

    const suspiciousScore = (text) => {
      const mojibake = text.match(/Ã[\u0080-\u00BF]|Â[\u0080-\u00BF]|\uFFFD/g);
      return mojibake ? mojibake.length : 0;
    };

    const candidates = [];
    try { candidates.push({ enc:'utf-8', text: new TextDecoder('utf-8', {fatal:true}).decode(buffer) }); } catch(e) {}
    if(candidates.length === 0){
      // UTF-8 no es válido de forma estricta: probar las codificaciones más comunes en CSV de Excel
      try { candidates.push({ enc:'windows-1252', text: new TextDecoder('windows-1252').decode(buffer) }); } catch(e) {}
      try { candidates.push({ enc:'macintosh', text: new TextDecoder('macintosh').decode(buffer) }); } catch(e) {}
      try { candidates.push({ enc:'iso-8859-1', text: new TextDecoder('iso-8859-1').decode(buffer) }); } catch(e) {}
    } else {
      // UTF-8 fue válido, pero igual puede tener mojibake si el archivo original era windows-1252
      // y alguien ya lo "arregló" mal una vez. Comparamos igual por seguridad.
      try { candidates.push({ enc:'windows-1252', text: new TextDecoder('windows-1252').decode(buffer) }); } catch(e) {}
    }
    if(candidates.length === 0) return new TextDecoder('utf-8').decode(buffer); // último recurso

    candidates.forEach(c => c.score = suspiciousScore(c.text));
    candidates.sort((a,b)=> a.score - b.score);
    return candidates[0].text;
  }

  // Busca la columna probando varias palabras posibles (sinónimos comunes en español)
  function findHeaderIdx(headers, ...synonyms){
    for(const syn of synonyms){
      const i = headers.findIndex(h=>h.includes(syn));
      if(i>-1) return i;
    }
    return -1;
  }

  function parseFechaLoose(str){
    if(!str) return '';
    str = String(str).trim();
    let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
    const d = new Date(str);
    if(!isNaN(d.getTime())) return todayFromDate(d);
    return '';
  }

  function todayFromDate(d){
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${d.getFullYear()}-${m}-${day}`;
  }

  function parseMoneyLoose(str){
    if(typeof str === 'number') return str;
    if(!str) return 0;
    const cleaned = String(str).replace(/[^0-9-]/g, '');
    return Number(cleaned) || 0;
  }

  function fmtMoney(n){
    const v = Math.round(Number(n)||0);
    const sign = v < 0 ? '-' : '';
    return sign + '$' + Math.abs(v).toLocaleString('es-CL');
  }

  // Igual que fmtMoney, pero envuelve los valores negativos en rojo para verlos de un vistazo.
  // Usar en contextos HTML (tablas, KPIs). NO usar dentro de <title> de SVG ni en toasts (texto plano).
  function fmtMoneyC(n){
    const text = fmtMoney(n);
    return Number(n) < 0 ? `<span style="color:var(--expense)">${text}</span>` : text;
  }

  function fmtPct(n){
    if (!isFinite(n)) n = 0;
    return (n*100).toLocaleString('es-CL', {minimumFractionDigits:1, maximumFractionDigits:1}) + '%';
  }

  // Igual que fmtPct, pero en rojo si es negativo. Usar solo en contextos HTML.
  function fmtPctC(n){
    const text = fmtPct(n);
    return (isFinite(n) && n < 0) ? `<span style="color:var(--expense)">${text}</span>` : text;
  }

  function fmtDate(iso){
    if(!iso) return '';
    const [y,m,d] = iso.split('-');
    return `${d}-${m}-${y}`;
  }

  function escapeHtml(str){
    if (str === undefined || str === null) return '';
    return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
  }

  function fmtMoneyShort(v){
    const av = Math.abs(v);
    const sign = v < 0 ? '-' : '';
    if(av >= 1000000) return sign + '$' + (av/1000000).toFixed(av>=10000000?0:1).replace(/\.0$/,'') + 'M';
    if(av >= 1000) return sign + '$' + Math.round(av/1000) + 'k';

  function svgBarChart(labels, seriesA, seriesB, labelA, labelB){
    const W = 640, H = 260, padL = 48, padR = 12, padT = 16, padB = 30;
    const chartW = W - padL - padR, chartH = H - padT - padB;
    const maxVal = Math.max(1, ...seriesA, ...seriesB);
    const n = labels.length;
    const groupW = chartW / n;
    const barW = Math.max(3, groupW * 0.32);
    const gap = groupW * 0.08;
    const yTicks = 4;

    let grid = '';
    for(let i=0;i<=yTicks;i++){
      const v = maxVal * i / yTicks;
      const y = padT + chartH - (chartH * i/yTicks);
      grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#EEEFF2" stroke-width="1"/>`;
      grid += `<text x="${padL-6}" y="${(y+3).toFixed(1)}" font-size="9" fill="#6B7280" text-anchor="end">${fmtMoneyShort(v)}</text>`;
    }

    let bars = '', xLabels = '';
    labels.forEach((lab,i)=>{
      const gx = padL + i*groupW;
      const hA = maxVal ? (seriesA[i]/maxVal)*chartH : 0;
      const hB = maxVal ? (seriesB[i]/maxVal)*chartH : 0;
      const xA = gx + gap;
      const xB = xA + barW + gap*0.5;
      bars += `<rect x="${xA.toFixed(1)}" y="${(padT+chartH-hA).toFixed(1)}" width="${barW.toFixed(1)}" height="${hA.toFixed(1)}" fill="#1C7C54" rx="2"><title>${lab}: ${fmtMoney(seriesA[i])}</title></rect>`;
      bars += `<rect x="${xB.toFixed(1)}" y="${(padT+chartH-hB).toFixed(1)}" width="${barW.toFixed(1)}" height="${hB.toFixed(1)}" fill="#A8322D" rx="2"><title>${lab}: ${fmtMoney(seriesB[i])}</title></rect>`;
      xLabels += `<text x="${(gx+groupW/2).toFixed(1)}" y="${H-8}" font-size="9" fill="#6B7280" text-anchor="middle">${lab}</text>`;
    });

    return `
      <svg viewBox="0 0 ${W} ${H}" class="fa-svg-chart" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gráfico de barras">
        ${grid}${bars}${xLabels}
      </svg>
      <div class="fa-chart-legend">
        <span class="fa-legend-item"><span class="fa-legend-dot" style="background:#1C7C54"></span>${labelA}</span>
        <span class="fa-legend-item"><span class="fa-legend-dot" style="background:#A8322D"></span>${labelB}</span>
      </div>
    `;
  }

  function svgLineChart(labels, values, label, opts){
    opts = opts || {};
    const fmtAxis = opts.fmtAxis || fmtMoneyShort;
    const fmtTooltip = opts.fmtTooltip || fmtMoney;
    const lineColor = opts.color || '#14213D';
    const W = 640, H = 220, padL = 48, padR = 12, padT = 16, padB = 30;
    const chartW = W - padL - padR, chartH = H - padT - padB;
    const maxVal = opts.maxVal !== undefined ? opts.maxVal : Math.max(1, ...values);
    const minVal = opts.minVal !== undefined ? opts.minVal : Math.min(0, ...values);
    const range = (maxVal - minVal) || 1;
    const n = values.length;
    const stepX = n > 1 ? chartW/(n-1) : 0;

    const points = values.map((v,i)=>{
      const x = padL + i*stepX;
      const y = padT + chartH - ((v-minVal)/range)*chartH;
      return [x,y];
    });
    const pathD = points.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const lastX = points.length? points[points.length-1][0].toFixed(1) : padL;
    const firstX = points.length? points[0][0].toFixed(1) : padL;
    const baseY = (padT+chartH).toFixed(1);
    const areaD = `${pathD} L${lastX},${baseY} L${firstX},${baseY} Z`;

    const yTicks = 4;
    let grid = '';
    for(let i=0;i<=yTicks;i++){
      const v = minVal + range*i/yTicks;
      const y = padT + chartH - (chartH*i/yTicks);
      grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#EEEFF2" stroke-width="1"/>`;
      grid += `<text x="${padL-6}" y="${(y+3).toFixed(1)}" font-size="9" fill="#6B7280" text-anchor="end">${fmtAxis(v)}</text>`;
    }
    const xLabels = labels.map((lab,i)=>`<text x="${(padL+i*stepX).toFixed(1)}" y="${H-8}" font-size="9" fill="#6B7280" text-anchor="middle">${lab}</text>`).join('');
    const dots = points.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="${lineColor}"><title>${labels[i]}: ${fmtTooltip(values[i])}</title></circle>`).join('');

    return `
      <svg viewBox="0 0 ${W} ${H}" class="fa-svg-chart" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gráfico de línea">
        ${grid}
        <path d="${areaD}" fill="${lineColor}22" stroke="none"/>
        <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2"/>
        ${dots}${xLabels}
      </svg>
      <div class="fa-chart-legend"><span class="fa-legend-item"><span class="fa-legend-dot" style="background:${lineColor}"></span>${label}</span></div>
    `;
  }

  function donutChart(entries){
    if(!entries.length){
      return '<div class="fa-empty">Aún no hay gastos registrados este año.</div>';
    }
    const total = entries.reduce((s,[,v])=>s+v,0) || 1;
    let acc = 0;
    const stops = entries.map(([label,val],i)=>{
      const start = (acc/total*360).toFixed(2);
      acc += val;
      const end = (acc/total*360).toFixed(2);
      return `${CHART_PALETTE[i%CHART_PALETTE.length]} ${start}deg ${end}deg`;
    }).join(', ');
    const legend = entries.map(([label,val],i)=>{
      const pct = total ? (val/total*100) : 0;
      return `<div class="fa-donut-legend-item">
        <span class="fa-donut-dot" style="background:${CHART_PALETTE[i%CHART_PALETTE.length]}"></span>
        <span class="fa-donut-label">${escapeHtml(label)}</span>
        <span class="fa-donut-pct">${pct.toFixed(1)}%</span>
      </div>`;
    }).join('');
    return `
      <div class="fa-donut-wrap">
        <div class="fa-donut-circle" style="background: conic-gradient(${stops});"></div>
        <div class="fa-donut-legend">${legend}</div>
      </div>
    `;
  }

  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 2800);
  }

  // ---------------- Storage (Firebase Realtime Database) ----------------
  function fbRef(key){
    return firebase.database().ref(key);
  }

  async function loadKey(key, fallback){
    try {
      const snap = await fbRef(key).once('value');
      const val = snap.val();
      return (val !== null && val !== undefined) ? val : fallback;
    } catch (e) {
      return fallback;
    }
  }
  function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

  async function saveKey(key, value, opts){
    const silent = opts && opts.silent;
    const log = silent ? console.warn : console.error;
    const maxAttempts = silent ? 5 : 3;
    for(let attempt=1; attempt<=maxAttempts; attempt++){
      try {
        await fbRef(key).set(value);
        return true;
      } catch (e) {
        log(`Firebase ${silent?'(siembra) ':''}intento ${attempt}/${maxAttempts} de "${key}" falló`, e);
        if(attempt < maxAttempts){
          await sleep(500 * attempt + Math.random()*300);
        } else {
          if(!silent) showToast('No se pudo guardar "' + key + '" en Firebase. Revisa tu conexión e intenta de nuevo.');
          return false;
        }
      }
    }
    return false;
  }

  // Como loadKey, pero si la clave nunca existió en Firebase, siembra el valor semilla de inmediato
  // (así los datos recuperados del respaldo quedan guardados desde el primer arranque, no solo en memoria).
  async function loadKeySeeded(key, seedValue){
    try {
      const snap = await fbRef(key).once('value');
      const val = snap.val();
      if(val !== null && val !== undefined) return val;
      await saveKey(key, seedValue, {silent:true});
      return seedValue;
    } catch (e) {
      return seedValue;
    }
  }

  async function init(){
    try {
      // Secuencial (no Promise.all) para no saturar el storage con escrituras simultáneas al sembrar datos.
      const config = await loadKeySeeded('config', SEED_CONFIG);
      const ingresos = await loadKeySeeded('ingresos', SEED_INGRESOS);
      const gastos = await loadKeySeeded('gastos', SEED_GASTOS);
      const pagosFijosCatalogo = await loadKeySeeded('pagosFijosCatalogo', SEED_PF_CATALOGO);
      const pagosFijosEstado = await loadKeySeeded('pagosFijosEstado', SEED_PF_ESTADO);
      state.config = config || {
        anio: new Date().getFullYear(),
        saldoInicial: 0,
        categoriasIngresos: CAT_INGRESOS_DEFAULT.slice(),
        categoriasGastos: CAT_GASTOS_DEFAULT.slice(),
        metodosPago: METODOS_DEFAULT.slice()
      };
      if (!state.config.metodosPago) state.config.metodosPago = METODOS_DEFAULT.slice();
      state.ingresos = ingresos || [];
      state.gastos = gastos || [];
      state.pagosFijosCatalogo = pagosFijosCatalogo || [];
      state.pagosFijosEstado = pagosFijosEstado || {};
      state.loading = false;
    } catch (e) {
      console.error(e);
      state.error = 'No se pudieron cargar tus datos. Intenta recargar.';
      state.loading = false;
    }
    render();
  }

  // ---------------- Cálculos ----------------
  function getYearsWithData(){
    const years = new Set();
    for(let y=2021; y<=2030; y++) years.add(y);
    years.add(state.config.anio);
    years.add(new Date().getFullYear());
    state.ingresos.forEach(i => { if(i.fecha) years.add(new Date(i.fecha+'T00:00:00').getFullYear()); });
    state.gastos.forEach(g => { if(g.fecha) years.add(new Date(g.fecha+'T00:00:00').getFullYear()); });
    return Array.from(years).sort((a,b)=>a-b);
  }

  function getMonthlyStats(year){
    const months = Array.from({length:12}, (_,i)=>({
      mes:i, ingresosCobrados:0, ingresosTotales:0, gastosPagados:0, gastosPorCategoria:{}
    }));
    state.config.categoriasGastos.forEach(cat=> months.forEach(m=> m.gastosPorCategoria[cat]=0));

    state.ingresos.forEach(ing=>{
      if(!ing.fecha) return;
      const d = new Date(ing.fecha+'T00:00:00');
      if(d.getFullYear() !== year) return;
      const m = d.getMonth();
      const monto = Number(ing.monto)||0;
      months[m].ingresosTotales += monto;
      if(ing.estado === 'Pagado') months[m].ingresosCobrados += monto;
    });

    state.gastos.forEach(g=>{
      if(!g.fecha) return;
      const d = new Date(g.fecha+'T00:00:00');
      if(d.getFullYear() !== year) return;
      const m = d.getMonth();
      const monto = Number(g.monto)||0;
      months[m].gastosPagados += monto;
      if(months[m].gastosPorCategoria[g.categoria] === undefined) months[m].gastosPorCategoria[g.categoria]=0;
      months[m].gastosPorCategoria[g.categoria] += monto;
    });

    let saldo = Number(state.config.saldoInicial)||0;
    months.forEach(m=>{
      m.saldoInicial = saldo;
      m.saldoFinal = saldo + m.ingresosCobrados - m.gastosPagados;
      saldo = m.saldoFinal;
      m.utilidadNeta = m.ingresosTotales - m.gastosPagados;
      m.margen = m.ingresosTotales !== 0 ? m.utilidadNeta / m.ingresosTotales : 0;
    });
    return months;
  }

  function getSaldoActual(){
    const ingresosPagados = state.ingresos.filter(i=>i.estado==='Pagado').reduce((s,i)=>s+(Number(i.monto)||0),0);
    const totalGastos = state.gastos.reduce((s,g)=>s+(Number(g.monto)||0),0);
    return (Number(state.config.saldoInicial)||0) + ingresosPagados - totalGastos;
  }

  function getEstadoPF(catId, year, month){
    return (state.pagosFijosEstado[catId] && state.pagosFijosEstado[catId][year] && state.pagosFijosEstado[catId][year][month]) || '';
  }

  function getEstadoVigenciaPF(catalogo, year, month){
    const inicioMes = new Date(year, month, 1);
    const finMes = new Date(year, month + 1, 0);
    if(catalogo.fechaInicio){
      const inicio = new Date(catalogo.fechaInicio + 'T00:00:00');
      if(finMes < inicio) return 'antes';
    }
    if(catalogo.vigenteHasta){
      const limite = new Date(catalogo.vigenteHasta + 'T00:00:00');
      if(inicioMes > limite) return 'despues';
    }
    return 'activo';
  }

  function isPagoFijoActivo(catalogo, year, month){
    return getEstadoVigenciaPF(catalogo, year, month) === 'activo';
  }

  function getPagosFijosStats(year){
    const items = state.pagosFijosCatalogo.map(cat=>{
      const montoBase = Number(cat.montoMensual)||0;
      const estados = Array.from({length:12}, (_,m)=> getEstadoPF(cat.id, year, m));
      const activos = Array.from({length:12}, (_,m)=> isPagoFijoActivo(cat, year, m));
      const montosPorMes = activos.map(a=> a ? montoBase : 0);
      const deuda = [];
      let running = 0;
      for(let m=0; m<12; m++){
        const montoMes = montosPorMes[m];
        const pagadoMonto = estados[m] === 'Pagado' ? montoMes : 0;
        running = Math.max(running + montoMes - pagadoMonto, 0);
        deuda.push(running);
      }
      return { catalogo: cat, monto: montoBase, montosPorMes, activos, estados, deuda };
    });
    const totalEsperado = Array(12).fill(0);
    const totalPagado = Array(12).fill(0);
    const totalDeuda = Array(12).fill(0);
    items.forEach(it=>{
      for(let m=0; m<12; m++){
        totalEsperado[m] += it.montosPorMes[m];
        totalPagado[m] += (it.estados[m]==='Pagado' ? it.montosPorMes[m] : 0);
        totalDeuda[m] += it.deuda[m];
      }
    });
    const pendienteMes = totalEsperado.map((v,m)=> v - totalPagado[m]);
    return { items, totalEsperado, totalPagado, pendienteMes, totalDeuda };
  }

  // Utilidad/Margen "real" ACUMULADA HASTA EL MES DE CORTE (no incluye meses futuros, que aún no son deuda).
  // Descuenta de la utilidad contable lo que se debería haber pagado en compromisos fijos y quedó
  // pendiente hasta esa fecha (deuda generada), no solo lo que se pagó en caja.
  function getUtilidadReal(year, cutoffMonth){
    const months = getMonthlyStats(year);
    const pf = getPagosFijosStats(year);
    const monthly = months.map((m,i)=>{
      const pendientePF = pf.pendienteMes[i] || 0;
      const utilidadReal = m.utilidadNeta - pendientePF;
      const margenReal = m.ingresosTotales !== 0 ? utilidadReal / m.ingresosTotales : 0;
      return { ingresos: m.ingresosTotales, gastos: m.gastosPagados, utilidadNeta: m.utilidadNeta,
                margenNeto: m.margen, pendientePF, utilidadReal, margenReal };
    });
    // Solo enero..mes de corte (inclusive) — los meses futuros no cuentan como deuda todavía.
    const uptoMonths = months.slice(0, cutoffMonth + 1);
    const ingresosAcum = uptoMonths.reduce((s,m)=>s+m.ingresosTotales,0);
    const utilidadNetaAcum = uptoMonths.reduce((s,m)=>s+m.utilidadNeta,0);
    const deudaAcum = pf.totalDeuda[cutoffMonth] || 0;
    const utilidadRealAcum = utilidadNetaAcum - deudaAcum;
    const margenNetoAcum = ingresosAcum !== 0 ? utilidadNetaAcum/ingresosAcum : 0;
    const margenRealAcum = ingresosAcum !== 0 ? utilidadRealAcum/ingresosAcum : 0;
    return { monthly, cutoffMonth, ingresosAcum, utilidadNetaAcum, margenNetoAcum, deudaAcum, utilidadRealAcum, margenRealAcum };
  }

  // ---------------- Informe descargable (Resumen + Flujo de Caja + Rentabilidad de un período) ----------------
  // Evolución mensual de Fijos vs Variables (para ver la proporción mes a mes)
  function getComposicionMensual(anio){
    const months = Array.from({length:12}, ()=> ({ fijos:0, variables:0 }));
    state.gastos.forEach(g=>{
      if(!g.fecha) return;
      const d = new Date(g.fecha+'T00:00:00');
      if(d.getFullYear() !== anio) return;
      const m = d.getMonth();
      const monto = Number(g.monto)||0;
      if(g.origenPagoFijo) months[m].fijos += monto;
      else months[m].variables += monto;
    });
    return months.map((m,i)=>{
      const total = m.fijos + m.variables;
      return { mes: MESES[i], mesCorto: MESES_CORTO[i], fijos:m.fijos, variables:m.variables, total,
               pctFijos: total? m.fijos/total : 0, pctVariables: total? m.variables/total : 0 };
    });
  }

  // Matriz de Categoría x Mes, filtrable por tipo ('fijos' | 'variables' | 'todos') — para ver $ o % de cada categoría mes a mes
  function getCategoriaMensual(anio, tipo){
    const gastosAnio = state.gastos.filter(g=> g.fecha && new Date(g.fecha+'T00:00:00').getFullYear()===anio);
    const filtrados = tipo==='todos' ? gastosAnio : gastosAnio.filter(g=> tipo==='fijos' ? !!g.origenPagoFijo : !g.origenPagoFijo);

    const matrix = {};
    state.config.categoriasGastos.forEach(c=> matrix[c] = Array(12).fill(0));
    const totalPorMes = Array(12).fill(0);
    filtrados.forEach(g=>{
      const d = new Date(g.fecha+'T00:00:00');
      const m = d.getMonth();
      const monto = Number(g.monto)||0;
      if(!matrix[g.categoria]) matrix[g.categoria] = Array(12).fill(0);
      matrix[g.categoria][m] += monto;
      totalPorMes[m] += monto;
    });
    const totalAnual = totalPorMes.reduce((s,v)=>s+v,0);
    const cats = Object.keys(matrix)
      .map(cat=>({ cat, total: matrix[cat].reduce((s,v)=>s+v,0) }))
      .filter(c=>c.total>0)
      .sort((a,b)=>b.total-a.total)
      .map(c=>c.cat);
    return { cats, matrix, totalPorMes, totalAnual };
  }

  function getInformeData(anio, mesDesde, mesHasta){
    const months = getMonthlyStats(anio);
    const pf = getPagosFijosStats(anio);
    const periodo = months.slice(mesDesde, mesHasta + 1);

    const ingresosTotal = periodo.reduce((s,m)=>s+m.ingresosTotales,0);
    const gastosTotal = periodo.reduce((s,m)=>s+m.gastosPagados,0);
    const utilidadTotal = ingresosTotal - gastosTotal;
    const margenTotal = ingresosTotal !== 0 ? utilidadTotal/ingresosTotal : 0;
    const saldoInicial = months[mesDesde].saldoInicial;
    const saldoFinal = months[mesHasta].saldoFinal;
    const deudaPF = pf.totalDeuda[mesHasta] || 0;

    const catTotals = {};
    state.config.categoriasGastos.forEach(c=> catTotals[c]=0);
    periodo.forEach(m=> Object.keys(m.gastosPorCategoria).forEach(cat=>{ catTotals[cat] = (catTotals[cat]||0) + m.gastosPorCategoria[cat]; }));

    const periodoLabel = (mesDesde===0 && mesHasta===11) ? `Año ${anio}` : `${MESES[mesDesde]} – ${MESES[mesHasta]} ${anio}`;

    return { anio, mesDesde, mesHasta, periodo, ingresosTotal, gastosTotal, utilidadTotal, margenTotal,
             saldoInicial, saldoFinal, deudaPF, catTotals, periodoLabel };
  }

  // ---------------- Utilidades de orden y filtro (reutilizadas en todas las tablas) ----------------
  const NUMERIC_KEYS = new Set(['monto','montoMensual','mesIdx','ingresos','gastos','utilidad','margen','saldo','saldoInicial','saldoFinal','deuda','pct']);

  function sortRowsGeneric(rows, key, dir, getVal){
    const mult = dir === 'asc' ? 1 : -1;
    const extractor = getVal || ((row,k)=> row[k]);
    return rows.slice().sort((a,b)=>{
      let va = extractor(a,key), vb = extractor(b,key);
      if(NUMERIC_KEYS.has(key)){
        va = Number(va)||0; vb = Number(vb)||0;
      } else {
        va = (va===undefined||va===null? '' : va).toString().toLowerCase();
        vb = (vb===undefined||vb===null? '' : vb).toString().toLowerCase();
      }
      if(va < vb) return -1*mult;
      if(va > vb) return 1*mult;
      return 0;
    });
  }

  function thSort(table, key, label, numeric){
    const ts = state.tables[table];
    const active = ts.sortKey === key;
    const icon = active ? (ts.sortDir==='asc' ? '▲' : '▼') : '↕';
    return `<th class="sortable${numeric?' num':''}" data-action="sort-table" data-table="${table}" data-key="${key}">${label} <span class="fa-sort-icon${active?' active':''}">${icon}</span></th>`;
  }

  function filterBar(table, opts){
    const ts = state.tables[table];
    const hasActive = ts.search || (opts.selects||[]).some(s=> ts[s.field]);
    return `
      <div class="fa-filter-bar" data-form="filter-${table}">
        <input type="text" name="search" placeholder="${opts.placeholder||'Buscar...'}" value="${escapeHtml(ts.search)}">
        <button type="button" class="fa-btn fa-btn-ghost" data-action="apply-search" data-table="${table}">Buscar</button>
        ${(opts.selects||[]).map(s=>`
          <select data-action="filter-select" data-table="${table}" data-field="${s.field}">
            <option value="">${s.allLabel}</option>
            ${s.options.map(o=>`<option value="${escapeHtml(o)}" ${ts[s.field]===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}
          </select>
        `).join('')}
        ${hasActive? `<button type="button" class="fa-btn fa-btn-ghost" data-action="clear-filters" data-table="${table}">Limpiar filtros</button>` : ''}
      </div>
    `;
  }

  // ---------------- COMPOSICIÓN DE GASTOS (Fijos vs Variables) ----------------
  function renderComposicion(){
    const delAnio = state.gastos.filter(g=> g.fecha && new Date(g.fecha+'T00:00:00').getFullYear()===state.config.anio);
    const fijos = delAnio.filter(g=>g.origenPagoFijo);
    const variables = delAnio.filter(g=>!g.origenPagoFijo);
    const totalFijos = fijos.reduce((s,g)=>s+(Number(g.monto)||0),0);
    const totalVariables = variables.reduce((s,g)=>s+(Number(g.monto)||0),0);
    const total = totalFijos + totalVariables;
    const pctFijos = total ? totalFijos/total : 0;
    const pctVariables = total ? totalVariables/total : 0;

    const catFijos = {}, catVariables = {};
    fijos.forEach(g=>{ catFijos[g.categoria] = (catFijos[g.categoria]||0) + (Number(g.monto)||0); });
    variables.forEach(g=>{ catVariables[g.categoria] = (catVariables[g.categoria]||0) + (Number(g.monto)||0); });
    const entriesFijos = Object.entries(catFijos).sort((a,b)=>b[1]-a[1]);
    const entriesVariables = Object.entries(catVariables).sort((a,b)=>b[1]-a[1]);

    const ts = state.tables.composicion;
    let list = delAnio.slice();
    if(ts.tipo) list = list.filter(g=> ts.tipo==='Fijo' ? !!g.origenPagoFijo : !g.origenPagoFijo);
    if(ts.categoria) list = list.filter(g=>g.categoria===ts.categoria);
    if(ts.metodo) list = list.filter(g=>g.metodo===ts.metodo);
    if(ts.mes){
      const mesIdx = MESES.indexOf(ts.mes);
      list = list.filter(g=>{
        if(!g.fecha) return false;
        return new Date(g.fecha+'T00:00:00').getMonth()===mesIdx;
      });
    }
    if(ts.search){
      const s = ts.search.toLowerCase();
      list = list.filter(g=> `${g.proveedor||''} ${g.descripcion||''}`.toLowerCase().includes(s));
    }
    list = sortRowsGeneric(list, ts.sortKey, ts.sortDir);

    return `

        <div class="fa-filter-count">Mostrando ${list.length} de ${delAnio.length}</div>

  // ---------------- CSV export ----------------
  function downloadCsv(filename, rows){
    const csv = rows.map(r => r.map(v=>{
      const s = String(v===undefined||v===null?'':v).replace(/"/g,'""');
      return /[",\n;]/.test(s) ? `"${s}"` : s;
    }).join(';')).join('\n');
    const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---------------- Exportar a Excel (snapshot con los datos actuales de la app) ----------------
  function M(v){ return { v: Math.round(Number(v)||0), fmt:'money' }; }
  function P(v){ return { v: Number(v)||0, fmt:'pct' }; }

  function buildSheet(rows, colWidths){
    const aoa = rows.map(row => row.map(c => (c && typeof c === 'object' && 'v' in c) ? c.v : (c===undefined?'':c)));
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    rows.forEach((row, r) => {
      row.forEach((c, cIdx) => {
        if(c && typeof c === 'object' && c.fmt){
          const addr = XLSX.utils.encode_cell({r, c:cIdx});
          if(!ws[addr]) return;
          if(c.fmt === 'money') ws[addr].z = '"$"#,##0';
          else if(c.fmt === 'pct') ws[addr].z = '0.0%';
        }
      });
    });
    if(colWidths) ws['!cols'] = colWidths.map(w=>({wch:w}));
    return ws;
  }

  function exportToExcel(){
    if(!window.XLSX){ showToast('La librería de Excel aún está cargando, intenta de nuevo en un segundo.'); return; }
    try{
      const anio = state.config.anio;
      const months = getMonthlyStats(anio);
      const pf = getPagosFijosStats(anio);
      const ingresosAnio = months.reduce((s,m)=>s+m.ingresosTotales,0);
      const gastosAnio = months.reduce((s,m)=>s+m.gastosPagados,0);
      const utilidadAnio = ingresosAnio - gastosAnio;
      const margenAnio = ingresosAnio !== 0 ? utilidadAnio/ingresosAnio : 0;
      const saldoActual = getSaldoActual();
      const deudaPFFecha = pf.totalDeuda[state.mesCortePF] || 0;

      const wb = XLSX.utils.book_new();

      // --- Resumen ---
      const resRows = [
        ['Resumen Financiero Mensual'],
        [`Año: ${anio}  ·  Exportado: ${new Date().toLocaleString('es-CL')}`],
        [],
        ['Ingresos Totales (año)','Gastos Totales (año)','Utilidad Neta (año)','Margen Neto (año)','Saldo de Caja Actual','Deuda Pagos Fijos (a '+MESES[state.mesCortePF]+')'],
        [M(ingresosAnio), M(gastosAnio), M(utilidadAnio), P(margenAnio), M(saldoActual), M(deudaPFFecha)],
        [],
        ['Mes','Ingresos','Gastos','Utilidad Neta','Margen %','Saldo de Caja'],
        ...months.map((m,i)=>[MESES[i], M(m.ingresosTotales), M(m.gastosPagados), M(m.utilidadNeta), P(m.margen), M(m.saldoFinal)])

      XLSX.utils.book_append_sheet(wb, buildSheet(resRows, [16,14,14,14,12,14]), 'Resumen');

      // --- Ingresos ---
      const ingRows = [['Fecha','Cliente','Descripción','Categoría','Monto','Estado']];
      state.ingresos.slice().sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||'')).forEach(i=>{
        ingRows.push([i.fecha||'', i.cliente||'', i.descripcion||'', i.categoria||'', M(i.monto), i.estado||'']);

        gasRows.push([g.fecha||'', g.proveedor||'', g.descripcion||'', g.categoria||'', M(g.monto), g.metodo||'']);
      });
      XLSX.utils.book_append_sheet(wb, buildSheet(gasRows, [13,26,34,30,14,18]), 'Gastos');

      // --- Pagos Fijos ---
      const pfRows = [
        ['Catálogo de Pagos Fijos'],
        ['Concepto','Categoría','Monto Mensual'],
        ...state.pagosFijosCatalogo.map(c=>[c.concepto||'', c.categoria||'', M(c.montoMensual)]),
        [],
        ['Estado de Pago por Mes'],
        ['Concepto', ...MESES_CORTO, 'Meses Pagados'],
        ...pf.items.map(it=>[it.catalogo.concepto, ...it.estados.map(e=>e||''), `${it.estados.filter(e=>e==='Pagado').length} / 12`]),
        ['TOTAL PAGADO', ...pf.totalPagado.map(M)],
        ['TOTAL ESPERADO', ...pf.totalEsperado.map(M)],
        ['PENDIENTE DEL MES', ...pf.pendienteMes.map(M)],
        [],
        ['Deuda Acumulada por Concepto'],
        ['Concepto', ...MESES_CORTO, 'A Diciembre'],
        ...pf.items.map(it=>[it.catalogo.concepto, ...it.deuda.map(M), M(it.deuda[11])]),
        ['TOTAL DEUDA ACUMULADA', ...pf.totalDeuda.map(M), M(pf.totalDeuda[11])],
        [],
        ['Mes de corte', MESES[state.mesCortePF]],
        ['Deuda acumulada a la fecha', M(deudaPFFecha)],
        ['Venta / cobro adicional necesario', M(deudaPFFecha)]
      ];
      XLSX.utils.book_append_sheet(wb, buildSheet(pfRows, [30,12,12,12,12,12,12,12,12,12,12,12,14]), 'Pagos Fijos');

      // --- Flujo de Caja ---
      const fcRows = [['Mes','Saldo Inicial','(+) Ingresos Cobrados','(-) Gastos Pagados','(=) Saldo Final']];
      months.forEach((m,i)=> fcRows.push([MESES[i], M(m.saldoInicial), M(m.ingresosCobrados), M(m.gastosPagados), M(m.saldoFinal)]));
      fcRows.push(['Total Año', M(months[0].saldoInicial), M(months.reduce((s,m)=>s+m.ingresosCobrados,0)), M(months.reduce((s,m)=>s+m.gastosPagados,0)), M(months[11].saldoFinal)]);
      XLSX.utils.book_append_sheet(wb, buildSheet(fcRows, [16,16,18,16,16]), 'Flujo de Caja');

      // --- Rentabilidad ---
      const catTotals = {};
      state.config.categoriasGastos.forEach(c=> catTotals[c]=0);
      months.forEach(m=> Object.keys(m.gastosPorCategoria).forEach(cat=>{ catTotals[cat]=(catTotals[cat]||0)+m.gastosPorCategoria[cat]; }));
      const catEntries = Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
      const rentRows = [
        ['Estado de Resultados Mensual'],
        [],
        ['Mes','Ingresos','Gastos','Utilidad Neta','Margen %'],
        ...months.map((m,i)=>[MESES[i], M(m.ingresosTotales), M(m.gastosPagados), M(m.utilidadNeta), P(m.margen)]),
        [],
        ['Gastos por Categoría — Total del Año'],
        ['Categoría','Monto','% del Total'],
        ...catEntries.map(([cat,val])=>[cat, M(val), P(gastosAnio? val/gastosAnio : 0)])
      ];
      XLSX.utils.book_append_sheet(wb, buildSheet(rentRows, [34,14,14,14,12]), 'Rentabilidad');

      // --- Configuración ---
      const cfgRows = [
        ['Año del reporte', anio],
        ['Saldo inicial de caja', M(state.config.saldoInicial)],
        [],
        ['Categorías de Ingresos'],
        ...state.config.categoriasIngresos.map(c=>[c]),
        [],
        ['Categorías de Gastos'],
        ...state.config.categoriasGastos.map(c=>[c]),
        [],
        ['Métodos de Pago'],
        ...state.config.metodosPago.map(c=>[c])
      ];
      XLSX.utils.book_append_sheet(wb, buildSheet(cfgRows, [34]), 'Configuración');

      XLSX.writeFile(wb, `Seguimiento_Financiero_${anio}.xlsx`);
      showToast('Excel descargado');
    } catch(err){
      console.error('Export error', err);
      showToast('No se pudo generar el Excel. Intenta de nuevo.');
    }
  }

  async function exportInformeJpg(){
    if(!window.html2canvas){ showToast('La librería de imagen aún está cargando, intenta de nuevo en un segundo.'); return; }
    const container = getOrCreateInformeContainer();
    try{
      const data = getInformeData(state.config.anio, state.informe.mesDesde, state.informe.mesHasta);
      container.innerHTML = buildInformeHtml(data);

          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('Imagen JPG del informe descargada');

        }, 'image/jpeg', 0.92);
      });
    } catch(err){
      console.error('Informe JPG error', err);
      showToast('No se pudo generar la imagen del informe.');
    } finally {
      container.style.cssText = 'display:none;';

  async function importCsvIngresos(file){
    try{
      const text = await readFileSmartEncoding(file);
      const rows = parseCsv(text);
      if(rows.length < 2){ showToast('El archivo no tiene filas de datos.'); return; }
      const headers = rows[0].map(normalizeHeader);
      const idx = {
        fecha: findHeaderIdx(headers, 'fecha'),
        cliente: findHeaderIdx(headers, 'cliente'),
        descripcion: findHeaderIdx(headers, 'descripcion', 'detalle', 'glosa', 'concepto', 'observacion', 'comentario'),
        categoria: findHeaderIdx(headers, 'categoria', 'rubro'),
        monto: findHeaderIdx(headers, 'monto', 'valor', 'total'),
        estado: findHeaderIdx(headers, 'estado')
      };
      if(idx.fecha===-1 || idx.monto===-1){
        showToast('El archivo debe tener al menos columnas de Fecha y Monto (revisa los encabezados).');
        return;
      }
      let ok=0, skipped=0;
      const nuevos = [];
      for(let r=1; r<rows.length; r++){
        const row = rows[r];
        if(!row || row.every(c=>!c || !c.trim())) continue;
        const fecha = parseFechaLoose(row[idx.fecha]);
        const monto = parseMoneyLoose(row[idx.monto]);
        if(!fecha || monto<=0){ skipped++; continue; }
        const estadoRaw = idx.estado>-1 ? (row[idx.estado]||'') : '';
        nuevos.push({
          id: uid('ing'),
          fecha,
          cliente: idx.cliente>-1 ? (row[idx.cliente]||'').trim() : '',
          descripcion: idx.descripcion>-1 ? (row[idx.descripcion]||'').trim() : '',
          categoria: idx.categoria>-1 ? (row[idx.categoria]||'').trim() : (state.config.categoriasIngresos[0]||''),
          monto,
          estado: /pend/i.test(estadoRaw) ? 'Pendiente' : 'Pagado'
        });
        ok++;
      }
      if(ok===0){ showToast('No se pudo importar ninguna fila válida. Revisa fechas y montos del archivo.'); return; }
      nuevos.forEach(n=>{
        if(n.categoria && !state.config.categoriasIngresos.includes(n.categoria)) state.config.categoriasIngresos.push(n.categoria);
      });
      state.ingresos = state.ingresos.concat(nuevos);
      await saveKey('ingresos', state.ingresos);
      await saveKey('config', state.config);
      showToast(`Se importaron ${ok} ingresos${skipped? ' ('+skipped+' filas omitidas por datos inválidos)':''}`);
      render();
    } catch(err){
      console.error('CSV import error (ingresos)', err);
      showToast((err && err.message) ? err.message : 'No se pudo leer el archivo. Verifica que sea un CSV válido.');
    }
  }

  function readFields(container){
    const obj = {};
    if(!container) return obj;
    container.querySelectorAll('[name]').forEach(el=>{ obj[el.name] = el.value; });
    return obj;
  }

  root.addEventListener('click', async (e)=>{
    const btn = e.target.closest('[data-action]');
    if(!btn) return;
    const action = btn.dataset.action;
    try{

    if(action === 'confirm-cancel'){
      state.confirmDialog = null;
      state.pendingImportJson = null;
      render();
    }
    else if(action === 'confirm-noop'){
      // clic dentro del modal (no en un botón): no hacer nada, solo evitar que se cierre
    }
    else if(action === 'confirm-ok'){
      const cd = state.confirmDialog;
      state.confirmDialog = null;
      if(!cd){ render(); }
      else if(cd.action === 'do-delete-ingreso'){
        state.ingresos = state.ingresos.filter(i=>i.id!==cd.data);
        await saveKey('ingresos', state.ingresos);
        showToast('Ingreso eliminado');
        render();
      }
      else if(cd.action === 'do-delete-gasto'){
        const gastoAEliminar = state.gastos.find(g=>g.id===cd.data);
        state.gastos = state.gastos.filter(g=>g.id!==cd.data);
        await saveKey('gastos', state.gastos);
        if(gastoAEliminar && gastoAEliminar.origenPagoFijo){
          const [, catId, ym] = gastoAEliminar.origenPagoFijo.split(':');
          const [anioStr, mesStr] = ym.split('-');
          const anio = Number(anioStr), month = Number(mesStr) - 1;
          if(state.pagosFijosEstado[catId] && state.pagosFijosEstado[catId][anio]){
            state.pagosFijosEstado[catId][anio][month] = '';
            await saveKey('pagosFijosEstado', state.pagosFijosEstado);
          }
          showToast('Gasto eliminado — se desmarcó como pagado en Pagos Fijos');
        } else {
          showToast('Gasto eliminado');
        }
        render();
      }
      else if(cd.action === 'do-delete-pf'){
        state.pagosFijosCatalogo = state.pagosFijosCatalogo.filter(c=>c.id!==cd.data);
        delete state.pagosFijosEstado[cd.data];
        await Promise.all([saveKey('pagosFijosCatalogo', state.pagosFijosCatalogo), saveKey('pagosFijosEstado', state.pagosFijosEstado)]);
        showToast('Compromiso eliminado');
        render();
      }
      else if(cd.action === 'do-mark-pagado-pf'){
        const { catId, month, anio } = cd.data;
        const fechaInput = document.getElementById('fa-confirm-date-input');
        const fechaPago = fechaInput && fechaInput.value ? fechaInput.value : todayISO();

        if(!state.pagosFijosEstado[catId]) state.pagosFijosEstado[catId] = {};
        if(!state.pagosFijosEstado[catId][anio]) state.pagosFijosEstado[catId][anio] = Array(12).fill('');
        state.pagosFijosEstado[catId][anio][month] = 'Pagado';
        await saveKey('pagosFijosEstado', state.pagosFijosEstado);

        const catalogo = state.pagosFijosCatalogo.find(c=>c.id===catId);
        const linkTag = `pf:${catId}:${anio}-${String(month+1).padStart(2,'0')}`;
        const existingIdx = state.gastos.findIndex(g=>g.origenPagoFijo===linkTag);
        const gastoObj = {
          id: existingIdx>-1 ? state.gastos[existingIdx].id : uid('gas'),
          fecha: fechaPago,
          proveedor: catalogo ? catalogo.concepto : '',
          descripcion: `Pago fijo: ${catalogo?catalogo.concepto:''} (${MESES[month]} ${anio})`,
          categoria: catalogo ? catalogo.categoria : (state.config.categoriasGastos[0]||''),
          monto: catalogo ? (Number(catalogo.montoMensual)||0) : 0,
          metodo: existingIdx>-1 ? state.gastos[existingIdx].metodo : (state.config.metodosPago[0]||''),
          origenPagoFijo: linkTag
        };
        if(existingIdx>-1) state.gastos[existingIdx] = gastoObj;
        else state.gastos.push(gastoObj);
        await saveKey('gastos', state.gastos);
        showToast(`Pago registrado el ${fmtDate(fechaPago)} — se agregó a Gastos`);
        render();
      }
      else if(cd.action === 'do-bulk-delete-ingresos'){
        const ids = state.selected.ingresos;
        const n = ids.size;
        state.ingresos = state.ingresos.filter(i=>!ids.has(i.id));
        state.selected.ingresos = new Set();
        await saveKey('ingresos', state.ingresos);
        showToast(`${n} ingreso${n===1?'':'s'} eliminado${n===1?'':'s'}`);
        render();
      }
      else if(cd.action === 'do-bulk-delete-gastos'){
        const ids = state.selected.gastos;
        const n = ids.size;
        const gastosAEliminar = state.gastos.filter(g=>ids.has(g.id));
        state.gastos = state.gastos.filter(g=>!ids.has(g.id));
        state.selected.gastos = new Set();
        await saveKey('gastos', state.gastos);
        let pfCambios = false;
        gastosAEliminar.forEach(g=>{
          if(g.origenPagoFijo){
            const [, catId, ym] = g.origenPagoFijo.split(':');
            const [anioStr, mesStr] = ym.split('-');
            const anio = Number(anioStr), month = Number(mesStr) - 1;
            if(state.pagosFijosEstado[catId] && state.pagosFijosEstado[catId][anio]){
              state.pagosFijosEstado[catId][anio][month] = '';
              pfCambios = true;
            }
          }
        });
        if(pfCambios) await saveKey('pagosFijosEstado', state.pagosFijosEstado);
        showToast(`${n} gasto${n===1?'':'s'} eliminado${n===1?'':'s'}${pfCambios? ' — se desmarcaron los pagos fijos vinculados':''}`);

      else if(cd.action === 'do-reset-data'){
        state.ingresos = [];
        state.gastos = [];
        state.pagosFijosCatalogo = [];
        state.pagosFijosEstado = {};
        state.config = {
          anio: new Date().getFullYear(),
          saldoInicial: 0,
          categoriasIngresos: CAT_INGRESOS_DEFAULT.slice(),
          categoriasGastos: CAT_GASTOS_DEFAULT.slice(),
          metodosPago: METODOS_DEFAULT.slice()
        };
        await Promise.all([
          saveKey('ingresos', []), saveKey('gastos', []), saveKey('config', state.config),
          saveKey('pagosFijosCatalogo', []), saveKey('pagosFijosEstado', {})
        ]);
        showToast('Datos restablecidos');
        render();
      }
      else if(cd.action === 'do-import-json'){
        const data = state.pendingImportJson;

        if(!data){ showToast('No se encontró el archivo a importar. Intenta de nuevo.'); render(); }

          const newConfig = data.config || state.config;

          await saveKey('config', state.config);
          await saveKey('ingresos', state.ingresos);
          await saveKey('gastos', state.gastos);
          await saveKey('pagosFijosCatalogo', state.pagosFijosCatalogo);

      if(data.monto <= 0){ showToast('Ingresa un monto mayor a 0.'); return; }
      if(state.editingIngresoId){
        const idx = state.ingresos.findIndex(i=>i.id===state.editingIngresoId);
        if(idx>-1) state.ingresos[idx] = {...state.ingresos[idx], ...data};
        state.editingIngresoId = null;
      } else {
        data.id = uid('ing');
        state.ingresos.push(data);

      await saveKey('ingresos', state.ingresos);

        render();

    } catch(err){

      showToast('Ocurrió un error inesperado. Si persiste, avísale a Claude con este detalle: ' + (err && err.message ? err.message : String(err)));
    }
  });

  root.addEventListener('change', async (e)=>{
    const el = e.target.closest('[data-action]');
    if(!el) return;
    const action = el.dataset.action;
    try{
    if(action === 'import-json-file'){
      const file = el.files && el.files[0];
      el.value = ''; // permitir volver a elegir el mismo archivo más adelante si hace falta
      if(!file) return;
      try{
        const text = await file.text();
        const data = JSON.parse(text);
        if(!data || typeof data !== 'object') throw new Error('El archivo no tiene el formato esperado.');
        state.pendingImportJson = data;
        const nIng = Array.isArray(data.ingresos) ? data.ingresos.length : 0;
        const nGas = Array.isArray(data.gastos) ? data.gastos.length : 0;
        const nPF = Array.isArray(data.pagosFijosCatalogo) ? data.pagosFijosCatalogo.length : 0;
        state.confirmDialog = {
          message: `Esto reemplazará TODOS tus datos actuales por los de "${file.name}" (${nIng} ingresos, ${nGas} gastos, ${nPF} pagos fijos). Esta acción no se puede deshacer.`,
          action: 'do-import-json',
          data: null,
          confirmLabel: 'Reemplazar datos'
        };
        render();
      } catch(err){
        console.error('Import error', err);
        showToast('No se pudo importar el archivo. Verifica que sea un respaldo válido exportado desde esta misma app.');
      }
    }
    else if(action === 'import-csv-ingresos-file'){
      const file = el.files && el.files[0];
      el.value = '';
      if(!file) return;
      await importCsvIngresos(file);
    }
    else if(action === 'import-csv-gastos-file'){
      const file = el.files && el.files[0];
      el.value = '';
      if(!file) return;
      await importCsvGastos(file);
    }
    else if(action === 'change-anio'){
      state.config.anio = Number(el.value);
      await saveKey('config', state.config);
      render();
    }
    else if(action === 'change-informe-desde'){
      state.informe.mesDesde = Number(el.value);
      if(state.informe.mesDesde > state.informe.mesHasta) state.informe.mesHasta = state.informe.mesDesde;
      render();
    }
    else if(action === 'change-informe-hasta'){
      state.informe.mesHasta = Number(el.value);
      if(state.informe.mesHasta < state.informe.mesDesde) state.informe.mesDesde = state.informe.mesHasta;
      render();
    }
    else if(action === 'change-composicion-tipo'){
      state.composicionVista.tipo = el.value;
      render();
    }
    else if(action === 'change-composicion-modo'){
      state.composicionVista.modo = el.value;
      render();
    }
    else if(action === 'change-mes-detalle'){
      state.detalleMes = Number(el.value);
      render();
    }
    else if(action === 'change-estado-pf'){
      const catId = el.dataset.catId;
      const month = Number(el.dataset.month);
      const anio = state.config.anio;
      const value = el.value;
      const catalogo = state.pagosFijosCatalogo.find(c=>c.id===catId);

      if(value === 'Pagado' && catalogo && isPagoFijoActivo(catalogo, anio, month)){
        // Pedir la fecha real de pago antes de registrar nada (independiente del mes del compromiso)
        state.confirmDialog = {
          message: `¿Qué día se pagó "${catalogo.concepto}" (${MESES[month]} ${anio})? Esta fecha es la que quedará registrada en Gastos.`,
          action: 'do-mark-pagado-pf',
          data: { catId, month, anio },
          confirmLabel: 'Registrar pago',
          inputType: 'date',
          inputDefault: todayISO()
        };
        render();
      } else {
        // Pendiente o vacío: se aplica al instante, sin pedir fecha
        if(!state.pagosFijosEstado[catId]) state.pagosFijosEstado[catId] = {};
        if(!state.pagosFijosEstado[catId][anio]) state.pagosFijosEstado[catId][anio] = Array(12).fill('');
        state.pagosFijosEstado[catId][anio][month] = value;
        await saveKey('pagosFijosEstado', state.pagosFijosEstado);

        const linkTag = `pf:${catId}:${anio}-${String(month+1).padStart(2,'0')}`;
        const existingIdx = state.gastos.findIndex(g=>g.origenPagoFijo===linkTag);
        if(existingIdx > -1){
          state.gastos.splice(existingIdx, 1);
          await saveKey('gastos', state.gastos);
          showToast('Se quitó el gasto vinculado (ya no está marcado como pagado)');
        }
        render();
      }
    }
    else if(action === 'change-mes-corte-pf'){
      state.mesCortePF = Number(el.value);
      render();
    }
    else if(action === 'filter-select'){
      const table = el.dataset.table;
      const field = el.dataset.field;
      state.tables[table][field] = el.value;
      render();
    }
    else if(action === 'toggle-select-ingreso'){
      const id = el.dataset.id;
      if(el.checked) state.selected.ingresos.add(id);
      else state.selected.ingresos.delete(id);
      render();
    }
    else if(action === 'toggle-select-all-ingresos'){
      const ids = (el.dataset.ids||'').split(',').filter(Boolean);
      if(el.checked) ids.forEach(id=>state.selected.ingresos.add(id));
      else ids.forEach(id=>state.selected.ingresos.delete(id));
      render();
    }
    else if(action === 'toggle-select-gasto'){
      const id = el.dataset.id;
      if(el.checked) state.selected.gastos.add(id);
      else state.selected.gastos.delete(id);
      render();
    }
    else if(action === 'toggle-select-all-gastos'){
      const ids = (el.dataset.ids||'').split(',').filter(Boolean);
      if(el.checked) ids.forEach(id=>state.selected.gastos.add(id));
      else ids.forEach(id=>state.selected.gastos.delete(id));
      render();
    }
    } catch(err){
      console.error('Error en change', action, err);
      showToast('Ocurrió un error inesperado. Si persiste, avísale a Claude con este detalle: ' + (err && err.message ? err.message : String(err)));
    }
  });

  root.addEventListener('keydown', (e)=>{
    if(e.key !== 'Enter') return;
    const input = e.target.closest('[data-form] input[name="search"]');
    if(!input) return;
    e.preventDefault();
    const container = input.closest('[data-form]');
    const btn = container && container.querySelector('[data-action="apply-search"]');
    if(btn) btn.click();
  });

  init();
})();
</script>
