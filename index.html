<style>
  :root{
    --ink:#14213D;
    --ink-soft:#3E4C6B;
    --bg:#F1F2F5;
    --surface:#FFFFFF;
    --border:#DEDFE3;
    --muted:#6B7280;
    --income:#1C7C54;
    --income-bg:#E8F4EE;
    --expense:#A8322D;
    --expense-bg:#FBEAE9;
    --navy-hover:#0B1730;
    --radius:10px;
  }
  *{ box-sizing:border-box; }
  #fin-app-root{
    font-family:'Inter',system-ui,sans-serif;
    color:var(--ink);
    background:var(--bg);
    min-height:600px;
    border-radius:14px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    font-variant-numeric: tabular-nums;
  }
  .fa-app-row{ display:flex; flex:1; min-height:0; }
  #fin-app-root h1,#fin-app-root h2,#fin-app-root h3{
    font-family:'Space Grotesk',sans-serif;
    margin:0;
    letter-spacing:-0.01em;
  }
  #fin-app-root .money{ font-variant-numeric: tabular-nums; font-feature-settings:"tnum" 1; }

  /* ---------- Sidebar ---------- */
  .fa-sidebar{
    width:210px; flex:0 0 210px;
    background:var(--ink);
    color:#fff;
    padding:20px 14px;
    display:flex; flex-direction:column;
    gap:4px;
  }
  .fa-brand{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700; font-size:16px;
    padding:4px 10px 18px 10px;
    display:flex; align-items:center; gap:8px;
  }
  .fa-brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--income); display:inline-block; }
  .fa-nav-btn{
    display:flex; align-items:center; gap:10px;
    background:transparent; border:none; color:#C3C9DB;
    text-align:left; padding:10px 12px; border-radius:8px;
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:500;
    cursor:pointer; transition:background .15s ease, color .15s ease;
  }
  .fa-nav-btn:hover{ background:rgba(255,255,255,.06); color:#fff; }
  .fa-nav-btn.active{ background:#fff; color:var(--ink); font-weight:600; }
  .fa-nav-icon{ width:16px; text-align:center; font-size:14px; }
  .fa-sidebar-footer{
    margin-top:auto; padding:12px 10px 0 10px; font-size:11px; color:#7C87A3; border-top:1px solid rgba(255,255,255,.1);
  }
  .fa-sidebar-export{
    margin-top:14px; width:100%; background:#fff; color:var(--ink); border:none; border-radius:8px;
    padding:10px 12px; font-family:'Inter',sans-serif; font-weight:600; font-size:12.5px; cursor:pointer;
    transition:background .15s ease;
  }
  .fa-sidebar-export:hover{ background:#E8EAED; }
  .fa-sidebar-export-secondary{ margin-top:6px; background:transparent; color:#C3C9DB; border:1px solid rgba(255,255,255,.2); }
  .fa-sidebar-export-secondary:hover{ background:rgba(255,255,255,.08); color:#fff; }

  /* ---------- Main ---------- */
  .fa-main{ flex:1; min-width:0; padding:24px 28px 40px 28px; overflow-y:auto; max-height:900px; }
  .fa-topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:10px; }
  .fa-topbar h1{ font-size:21px; }
  .fa-topbar .fa-sub{ color:var(--muted); font-size:12.5px; margin-top:2px; }
  .fa-year-select{
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600; color:var(--ink);
    background:#fff; border:1px solid var(--border); border-radius:8px; padding:7px 10px; cursor:pointer;
  }

  /* ---------- Cards / KPIs ---------- */
  .fa-kpi-grid{ display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px; }
  @media (max-width:900px){ .fa-kpi-grid{ grid-template-columns:repeat(2,1fr);} }
  .fa-kpi-grid-6{ grid-template-columns:repeat(6,1fr); }
  @media (max-width:1100px){ .fa-kpi-grid-6{ grid-template-columns:repeat(3,1fr); } }
  @media (max-width:900px){ .fa-kpi-grid-6{ grid-template-columns:repeat(2,1fr); } }
  .fa-kpi{
    background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--ink);
    border-radius:var(--radius); padding:13px 14px;
  }
  .fa-kpi.income{ border-left-color:var(--income); }
  .fa-kpi.expense{ border-left-color:var(--expense); }
  .fa-kpi-label{ font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.03em; margin-bottom:6px; }
  .fa-kpi-value{ font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; }
  .fa-kpi-value.income{ color:var(--income); }
  .fa-kpi-value.expense{ color:var(--expense); }

  .fa-card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:18px; margin-bottom:18px; }
  .fa-card-title{ font-size:14px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; }
  .fa-charts-row{ display:grid; grid-template-columns:1.3fr 1fr; gap:16px; margin-bottom:18px; }
  @media (max-width:900px){ .fa-charts-row{ grid-template-columns:1fr; } }
  .fa-chart-box{ position:relative; height:230px; }
  .fa-svg-chart{ width:100%; height:calc(100% - 22px); display:block; }
  .fa-chart-legend{ display:flex; gap:14px; justify-content:center; margin-top:4px; }
  .fa-legend-item{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
  .fa-legend-dot{ width:8px; height:8px; border-radius:2px; display:inline-block; }
  .fa-donut-wrap{ display:flex; align-items:center; gap:18px; height:100%; }
  .fa-donut-circle{ width:130px; height:130px; min-width:130px; border-radius:50%;
    -webkit-mask: radial-gradient(circle, transparent 54%, #000 55%);
    mask: radial-gradient(circle, transparent 54%, #000 55%); }
  .fa-donut-legend{ flex:1; min-width:0; max-height:210px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
  .fa-donut-legend-item{ display:flex; align-items:center; gap:7px; font-size:11.5px; }
  .fa-donut-dot{ width:8px; height:8px; border-radius:2px; flex:0 0 auto; }
  .fa-donut-label{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink-soft); }
  .fa-donut-pct{ font-weight:600; color:var(--ink); }
  .fa-real-grid{ display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .fa-real-col{ flex:1; min-width:150px; }
  .fa-real-op{ font-family:'Space Grotesk',sans-serif; font-size:22px; font-weight:700; color:var(--muted); }
  .fa-real-label{ font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.02em; margin-bottom:4px; }
  .fa-real-value{ font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:700; }
  .fa-real-sub{ font-size:12px; color:var(--muted); margin-top:2px; }
  .fa-real-highlight{ background:var(--income-bg); border:1px solid var(--income); border-radius:var(--radius); padding:12px 14px; }
  @media (max-width:760px){ .fa-real-op{ display:none; } .fa-real-col{ width:100%; } }

  /* ---------- Tables ---------- */
  table.fa-table{ width:100%; border-collapse:collapse; font-size:13px; }
  table.fa-table th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted);
    font-weight:600; padding:8px 10px; border-bottom:1px solid var(--border);
  }
  table.fa-table td{ padding:9px 10px; border-bottom:1px solid #EEEFF2; vertical-align:middle; }
  table.fa-table tr.income-row{ border-left:3px solid var(--income); }
  table.fa-table tr.expense-row{ border-left:3px solid var(--expense); }
  table.fa-table tr:hover{ background:#FAFAFB; }
  table.fa-table td.num, table.fa-table th.num{ text-align:right; }
  table.fa-table th.sortable{ cursor:pointer; user-select:none; white-space:nowrap; }

  // ---------------- Importar CSV (Ingresos / Gastos masivos desde Excel) ----------------
  function parseCsv(text){
    if(text.charCodeAt(0) === 0xFEFF) text = text.slice(1); // quitar BOM si el CSV lo trae (típico de Excel)
    const firstLine = (text.split(/\r?\n/)[0]) || '';
    const delim = (firstLine.split(';').length >= firstLine.split(',').length) ? ';' : ',';
    const rows = [];
    let row = [], field = '', inQuotes = false;
    for(let i=0; i<text.length; i++){
      const c = text[i];
      if(inQuotes){
        if(c === '"'){
          if(text[i+1] === '"'){ field += '"'; i++; }
          else inQuotes = false;
        } else field += c;
      } else {
        if(c === '"') inQuotes = true;
        else if(c === delim){ row.push(field); field=''; }
        else if(c === '\n'){ row.push(field); rows.push(row); row=[]; field=''; }
        else if(c === '\r'){ /* ignorar */ }
        else field += c;
      }
    }
    if(field.length || row.length){ row.push(field); rows.push(row); }
    return rows.filter(r => r.length>1 || (r.length===1 && r[0] && r[0].trim()!==''));
  }

  function normalizeHeader(h){
    return (h||'').toString().trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
  }

  // Excel en Windows a veces exporta CSV en Windows-1252 (ANSI) en vez de UTF-8. Si al leer como UTF-8
  // aparecen los patrones típicos de texto mal decodificado (mojibake) o el carácter de reemplazo "�",
  // se vuelve a leer el mismo archivo como Windows-1252, que es lo que casi siempre soluciona el problema.
  async function readFileSmartEncoding(file){
    const buffer = await file.arrayBuffer();

    // Si el archivo no es texto real (por ejemplo, es un .xlsx/.xls renombrado a .csv por error),
    // los primeros bytes no van a parecer texto plano — avisamos en vez de mostrar basura.
    const head = new Uint8Array(buffer.slice(0, 8));
    const looksBinary = (head[0]===0x50 && head[1]===0x4B) /* PK.. = zip/xlsx */
      || (head[0]===0xD0 && head[1]===0xCF) /* OLE = xls viejo */;
    if(looksBinary){
      throw new Error('El archivo no parece ser un CSV de texto (parece un Excel .xls/.xlsx renombrado). Vuelve a exportarlo como CSV desde Excel.');
    }

    const suspiciousScore = (text) => {
      const mojibake = text.match(/Ã[\u0080-\u00BF]|Â[\u0080-\u00BF]|\uFFFD/g);
      return mojibake ? mojibake.length : 0;
    };

    const candidates = [];
    try { candidates.push({ enc:'utf-8', text: new TextDecoder('utf-8', {fatal:true}).decode(buffer) }); } catch(e) {}
    if(candidates.length === 0){
      // UTF-8 no es válido de forma estricta: probar las codificaciones más comunes en CSV de Excel
      try { candidates.push({ enc:'windows-1252', text: new TextDecoder('windows-1252').decode(buffer) }); } catch(e) {}
      try { candidates.push({ enc:'macintosh', text: new TextDecoder('macintosh').decode(buffer) }); } catch(e) {}
      try { candidates.push({ enc:'iso-8859-1', text: new TextDecoder('iso-8859-1').decode(buffer) }); } catch(e) {}
    } else {
      // UTF-8 fue válido, pero igual puede tener mojibake si el archivo original era windows-1252
      // y alguien ya lo "arregló" mal una vez. Comparamos igual por seguridad.
      try { candidates.push({ enc:'windows-1252', text: new TextDecoder('windows-1252').decode(buffer) }); } catch(e) {}
    }
    if(candidates.length === 0) return new TextDecoder('utf-8').decode(buffer); // último recurso

    candidates.forEach(c => c.score = suspiciousScore(c.text));
    candidates.sort((a,b)=> a.score - b.score);
    return candidates[0].text;
  }

  // Busca la columna probando varias palabras posibles (sinónimos comunes en español)
  function findHeaderIdx(headers, ...synonyms){
    for(const syn of synonyms){
      const i = headers.findIndex(h=>h.includes(syn));
      if(i>-1) return i;
    }
    return -1;
  }

  function parseFechaLoose(str){
    if(!str) return '';
    str = String(str).trim();
    let m = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    m = str.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if(m) return `${m[3]}-${String(m[2]).padStart(2,'0')}-${String(m[1]).padStart(2,'0')}`;
    const d = new Date(str);
    if(!isNaN(d.getTime())) return todayFromDate(d);
    return '';
  }

  function parseMoneyLoose(str){
    if(typeof str === 'number') return str;

  }

  function fmtMoney(n){
    const v = Math.round(Number(n)||0);
    const sign = v < 0 ? '-' : '';
    return sign + '$' + Math.abs(v).toLocaleString('es-CL');

  // Igual que fmtMoney, pero envuelve los valores negativos en rojo para verlos de un vistazo.
  // Usar en contextos HTML (tablas, KPIs). NO usar dentro de <title> de SVG ni en toasts (texto plano).
  function fmtMoneyC(n){
    const text = fmtMoney(n);
    return Number(n) < 0 ? `<span style="color:var(--expense)">${text}</span>` : text;
  }

  function fmtPct(n){

  // Igual que fmtPct, pero en rojo si es negativo. Usar solo en contextos HTML.

  function svgBarChart(labels, seriesA, seriesB, labelA, labelB){
    const W = 640, H = 260, padL = 48, padR = 12, padT = 16, padB = 30;
    const chartW = W - padL - padR, chartH = H - padT - padB;
    const maxVal = Math.max(1, ...seriesA, ...seriesB);
    const n = labels.length;
    const groupW = chartW / n;
    const barW = Math.max(3, groupW * 0.32);
    const gap = groupW * 0.08;
    const yTicks = 4;

    let grid = '';
    for(let i=0;i<=yTicks;i++){
      const v = maxVal * i / yTicks;
      const y = padT + chartH - (chartH * i/yTicks);
      grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#EEEFF2" stroke-width="1"/>`;
      grid += `<text x="${padL-6}" y="${(y+3).toFixed(1)}" font-size="9" fill="#6B7280" text-anchor="end">${fmtMoneyShort(v)}</text>`;
    }

    let bars = '', xLabels = '';
    labels.forEach((lab,i)=>{
      const gx = padL + i*groupW;
      const hA = maxVal ? (seriesA[i]/maxVal)*chartH : 0;
      const hB = maxVal ? (seriesB[i]/maxVal)*chartH : 0;
      const xA = gx + gap;
      const xB = xA + barW + gap*0.5;
      bars += `<rect x="${xA.toFixed(1)}" y="${(padT+chartH-hA).toFixed(1)}" width="${barW.toFixed(1)}" height="${hA.toFixed(1)}" fill="#1C7C54" rx="2"><title>${lab}: ${fmtMoney(seriesA[i])}</title></rect>`;
      bars += `<rect x="${xB.toFixed(1)}" y="${(padT+chartH-hB).toFixed(1)}" width="${barW.toFixed(1)}" height="${hB.toFixed(1)}" fill="#A8322D" rx="2"><title>${lab}: ${fmtMoney(seriesB[i])}</title></rect>`;
      xLabels += `<text x="${(gx+groupW/2).toFixed(1)}" y="${H-8}" font-size="9" fill="#6B7280" text-anchor="middle">${lab}</text>`;
    });

    return `
      <svg viewBox="0 0 ${W} ${H}" class="fa-svg-chart" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gráfico de barras">
        ${grid}${bars}${xLabels}
      </svg>
      <div class="fa-chart-legend">
        <span class="fa-legend-item"><span class="fa-legend-dot" style="background:#1C7C54"></span>${labelA}</span>
        <span class="fa-legend-item"><span class="fa-legend-dot" style="background:#A8322D"></span>${labelB}</span>
      </div>
    `;
  }

  function svgLineChart(labels, values, label, opts){
    opts = opts || {};
    const fmtAxis = opts.fmtAxis || fmtMoneyShort;
    const fmtTooltip = opts.fmtTooltip || fmtMoney;
    const lineColor = opts.color || '#14213D';
    const W = 640, H = 220, padL = 48, padR = 12, padT = 16, padB = 30;
    const chartW = W - padL - padR, chartH = H - padT - padB;
    const maxVal = opts.maxVal !== undefined ? opts.maxVal : Math.max(1, ...values);
    const minVal = opts.minVal !== undefined ? opts.minVal : Math.min(0, ...values);
    const range = (maxVal - minVal) || 1;
    const n = values.length;
    const stepX = n > 1 ? chartW/(n-1) : 0;

    const points = values.map((v,i)=>{
      const x = padL + i*stepX;
      const y = padT + chartH - ((v-minVal)/range)*chartH;
      return [x,y];
    });
    const pathD = points.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const lastX = points.length? points[points.length-1][0].toFixed(1) : padL;
    const firstX = points.length? points[0][0].toFixed(1) : padL;
    const baseY = (padT+chartH).toFixed(1);
    const areaD = `${pathD} L${lastX},${baseY} L${firstX},${baseY} Z`;

    const yTicks = 4;
    let grid = '';
    for(let i=0;i<=yTicks;i++){
      const v = minVal + range*i/yTicks;
      const y = padT + chartH - (chartH*i/yTicks);
      grid += `<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="#EEEFF2" stroke-width="1"/>`;
      grid += `<text x="${padL-6}" y="${(y+3).toFixed(1)}" font-size="9" fill="#6B7280" text-anchor="end">${fmtAxis(v)}</text>`;
    }
    const xLabels = labels.map((lab,i)=>`<text x="${(padL+i*stepX).toFixed(1)}" y="${H-8}" font-size="9" fill="#6B7280" text-anchor="middle">${lab}</text>`).join('');
    const dots = points.map((p,i)=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="2.6" fill="${lineColor}"><title>${labels[i]}: ${fmtTooltip(values[i])}</title></circle>`).join('');

    return `
      <svg viewBox="0 0 ${W} ${H}" class="fa-svg-chart" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gráfico de línea">
        ${grid}
        <path d="${areaD}" fill="${lineColor}22" stroke="none"/>
        <path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2"/>
        ${dots}${xLabels}
      </svg>
      <div class="fa-chart-legend"><span class="fa-legend-item"><span class="fa-legend-dot" style="background:${lineColor}"></span>${label}</span></div>
    `;
  }

  function donutChart(entries){
    if(!entries.length){
      return '<div class="fa-empty">Aún no hay gastos registrados este año.</div>';
    }
    const total = entries.reduce((s,[,v])=>s+v,0) || 1;
    let acc = 0;
    const stops = entries.map(([label,val],i)=>{
      const start = (acc/total*360).toFixed(2);
      acc += val;
      const end = (acc/total*360).toFixed(2);
      return `${CHART_PALETTE[i%CHART_PALETTE.length]} ${start}deg ${end}deg`;
    }).join(', ');
    const legend = entries.map(([label,val],i)=>{
      const pct = total ? (val/total*100) : 0;
      return `<div class="fa-donut-legend-item">
        <span class="fa-donut-dot" style="background:${CHART_PALETTE[i%CHART_PALETTE.length]}"></span>
        <span class="fa-donut-label">${escapeHtml(label)}</span>
        <span class="fa-donut-pct">${pct.toFixed(1)}%</span>
      </div>`;
    }).join('');
    return `
      <div class="fa-donut-wrap">
        <div class="fa-donut-circle" style="background: conic-gradient(${stops});"></div>
        <div class="fa-donut-legend">${legend}</div>
      </div>
    `;
  }

  // ---------------- Storage (Firebase Realtime Database) ----------------
  function fbRef(key){
    return firebase.database().ref(key);
  }

  async function loadKey(key, fallback){
    try {
      const snap = await fbRef(key).once('value');
      const val = snap.val();
      return (val !== null && val !== undefined) ? val : fallback;
    } catch (e) {
      return fallback;
    }
  }
  function sleep(ms){ return new Promise(r=>setTimeout(r, ms)); }

  async function saveKey(key, value, opts){
    if(state.readOnly){
      showToast('Estás en modo solo lectura — este cambio no se guardó.');
      return false;
    }
    const silent = opts && opts.silent;
    const log = silent ? console.warn : console.error;
    const maxAttempts = silent ? 5 : 3;
    for(let attempt=1; attempt<=maxAttempts; attempt++){
      try {
        await fbRef(key).set(value);
        return true;
      } catch (e) {
        log(`Firebase ${silent?'(siembra) ':''}intento ${attempt}/${maxAttempts} de "${key}" falló`, e);
        if(attempt < maxAttempts){
          await sleep(500 * attempt + Math.random()*300);
        } else {
          if(!silent) showToast('No se pudo guardar "' + key + '" en Firebase. Revisa tu conexión e intenta de nuevo.');
          return false;
        }
      }
    }
    return false;
  }

  // Como loadKey, pero si la clave nunca existió en Firebase, siembra el valor semilla de inmediato
  // (así los datos recuperados del respaldo quedan guardados desde el primer arranque, no solo en memoria).
  async function loadKeySeeded(key, seedValue){
    try {
      const snap = await fbRef(key).once('value');
      const val = snap.val();
      if(val !== null && val !== undefined) return val;
      await saveKey(key, seedValue, {silent:true});
      return seedValue;
    } catch (e) {
      return seedValue;
    }
  }

  async function loadAppData(){
    try {
      state.loading = true;
      render();
      // Secuencial (no Promise.all) para no saturar el storage con escrituras simultáneas al sembrar datos.
      const config = await loadKeySeeded('config', SEED_CONFIG);
      const ingresos = await loadKeySeeded('ingresos', SEED_INGRESOS);
      const gastos = await loadKeySeeded('gastos', SEED_GASTOS);
      const pagosFijosCatalogo = await loadKeySeeded('pagosFijosCatalogo', SEED_PF_CATALOGO);
      const pagosFijosEstado = await loadKeySeeded('pagosFijosEstado', SEED_PF_ESTADO);
      state.config = config || {
        anio: new Date().getFullYear(),
        saldoInicial: 0,
        categoriasIngresos: CAT_INGRESOS_DEFAULT.slice(),
        categoriasGastos: CAT_GASTOS_DEFAULT.slice(),
        metodosPago: METODOS_DEFAULT.slice()
      };
      if (!state.config.metodosPago) state.config.metodosPago = METODOS_DEFAULT.slice();
      state.ingresos = ingresos || [];
      state.gastos = gastos || [];
      state.pagosFijosCatalogo = pagosFijosCatalogo || [];
      state.pagosFijosEstado = pagosFijosEstado || {};
      state.loading = false;
    } catch (e) {
      console.error(e);
      state.error = 'No se pudieron cargar tus datos. Intenta recargar.';
      state.loading = false;
    }
    render();
  }

  // La app arranca esperando a Firebase Auth: sin sesión -> login; con sesión pero sin rol -> sin autorización;
  // con sesión y rol -> carga los datos financieros normalmente.
  async function init(){
    if(typeof firebase === 'undefined' || !firebase.auth){
      state.authChecked = true;
      state.error = 'No se pudo cargar el sistema de acceso (Firebase). Revisa tu conexión e intenta recargar la página.';
      render();
      return;
    }
    firebase.auth().onAuthStateChanged(async (user)=>{
      state.authChecked = true;
      state.user = user;
      state.loginError = null;
      if(!user){
        state.role = null;
        render();
        return;
      }
      try {
        const snap = await firebase.database().ref('roles/' + user.uid).once('value');
        const role = snap.val();
        state.role = role || null;
        state.readOnly = role === 'viewer';
      } catch(e){
        console.error('Error al verificar el rol de acceso', e);
        state.role = null;
      }
      if(state.role){
        await loadAppData();
      } else {
        render();
      }
    });
  }

  // ---------------- Cálculos ----------------
  function getYearsWithData(){
    const years = new Set();
    for(let y=2021; y<=2030; y++) years.add(y);
    years.add(state.config.anio);
    years.add(new Date().getFullYear());
    state.ingresos.forEach(i => { if(i.fecha) years.add(new Date(i.fecha+'T00:00:00').getFullYear()); });
    state.gastos.forEach(g => { if(g.fecha) years.add(new Date(g.fecha+'T00:00:00').getFullYear()); });
    return Array.from(years).sort((a,b)=>a-b);
  }

  function getMonthlyStats(year){
    const months = Array.from({length:12}, (_,i)=>({
      mes:i, ingresosCobrados:0, ingresosTotales:0, gastosPagados:0, gastosPorCategoria:{}
    }));
    state.config.categoriasGastos.forEach(cat=> months.forEach(m=> m.gastosPorCategoria[cat]=0));

    state.ingresos.forEach(ing=>{
      if(!ing.fecha) return;
      const d = new Date(ing.fecha+'T00:00:00');
      if(d.getFullYear() !== year) return;
      const m = d.getMonth();
      const monto = Number(ing.monto)||0;
      months[m].ingresosTotales += monto;
      if(ing.estado === 'Pagado') months[m].ingresosCobrados += monto;
    });

    state.gastos.forEach(g=>{
      if(!g.fecha) return;
      const d = new Date(g.fecha+'T00:00:00');
      if(d.getFullYear() !== year) return;
      const m = d.getMonth();
      const monto = Number(g.monto)||0;
      months[m].gastosPagados += monto;
      if(months[m].gastosPorCategoria[g.categoria] === undefined) months[m].gastosPorCategoria[g.categoria]=0;
      months[m].gastosPorCategoria[g.categoria] += monto;
    });

    let saldo = Number(state.config.saldoInicial)||0;
    months.forEach(m=>{
      m.saldoInicial = saldo;
      m.saldoFinal = saldo + m.ingresosCobrados - m.gastosPagados;
      saldo = m.saldoFinal;
      m.utilidadNeta = m.ingresosTotales - m.gastosPagados;
      m.margen = m.ingresosTotales !== 0 ? m.utilidadNeta / m.ingresosTotales : 0;
    });
    return months;
  }

  function getSaldoActual(){
    const ingresosPagados = state.ingresos.filter(i=>i.estado==='Pagado').reduce((s,i)=>s+(Number(i.monto)||0),0);
    const totalGastos = state.gastos.reduce((s,g)=>s+(Number(g.monto)||0),0);
    return (Number(state.config.saldoInicial)||0) + ingresosPagados - totalGastos;
  }

  function getEstadoPF(catId, year, month){
    return (state.pagosFijosEstado[catId] && state.pagosFijosEstado[catId][year] && state.pagosFijosEstado[catId][year][month]) || '';
  }

  function getEstadoVigenciaPF(catalogo, year, month){
    const inicioMes = new Date(year, month, 1);
    const finMes = new Date(year, month + 1, 0);
    if(catalogo.fechaInicio){
      const inicio = new Date(catalogo.fechaInicio + 'T00:00:00');
      if(finMes < inicio) return 'antes';
    }
    if(catalogo.vigenteHasta){
      const limite = new Date(catalogo.vigenteHasta + 'T00:00:00');
      if(inicioMes > limite) return 'despues';
    }
    return 'activo';
  }

  function isPagoFijoActivo(catalogo, year, month){
    return getEstadoVigenciaPF(catalogo, year, month) === 'activo';
  }

  function getPagosFijosStats(year){
    const items = state.pagosFijosCatalogo.map(cat=>{
      const montoBase = Number(cat.montoMensual)||0;
      const estados = Array.from({length:12}, (_,m)=> getEstadoPF(cat.id, year, m));
      const activos = Array.from({length:12}, (_,m)=> isPagoFijoActivo(cat, year, m));
      const montosPorMes = activos.map(a=> a ? montoBase : 0);
      const deuda = [];
      let running = 0;
      for(let m=0; m<12; m++){
        const montoMes = montosPorMes[m];
        const pagadoMonto = estados[m] === 'Pagado' ? montoMes : 0;
        running = Math.max(running + montoMes - pagadoMonto, 0);
        deuda.push(running);
      }
      return { catalogo: cat, monto: montoBase, montosPorMes, activos, estados, deuda };
    });
    const totalEsperado = Array(12).fill(0);
    const totalPagado = Array(12).fill(0);
    const totalDeuda = Array(12).fill(0);
    items.forEach(it=>{
      for(let m=0; m<12; m++){
        totalEsperado[m] += it.montosPorMes[m];
        totalPagado[m] += (it.estados[m]==='Pagado' ? it.montosPorMes[m] : 0);
        totalDeuda[m] += it.deuda[m];
      }
    });
    const pendienteMes = totalEsperado.map((v,m)=> v - totalPagado[m]);
    return { items, totalEsperado, totalPagado, pendienteMes, totalDeuda };
  }

  // Utilidad/Margen "real" ACUMULADA HASTA EL MES DE CORTE (no incluye meses futuros, que aún no son deuda).
  // Descuenta de la utilidad contable lo que se debería haber pagado en compromisos fijos y quedó
  // pendiente hasta esa fecha (deuda generada), no solo lo que se pagó en caja.
  function getUtilidadReal(year, cutoffMonth){
    const months = getMonthlyStats(year);
    const pf = getPagosFijosStats(year);
    const monthly = months.map((m,i)=>{
      const pendientePF = pf.pendienteMes[i] || 0;
      const utilidadReal = m.utilidadNeta - pendientePF;
      const margenReal = m.ingresosTotales !== 0 ? utilidadReal / m.ingresosTotales : 0;
      return { ingresos: m.ingresosTotales, gastos: m.gastosPagados, utilidadNeta: m.utilidadNeta,
                margenNeto: m.margen, pendientePF, utilidadReal, margenReal };
    });
    // Solo enero..mes de corte (inclusive) — los meses futuros no cuentan como deuda todavía.
    const uptoMonths = months.slice(0, cutoffMonth + 1);
    const ingresosAcum = uptoMonths.reduce((s,m)=>s+m.ingresosTotales,0);
    const utilidadNetaAcum = uptoMonths.reduce((s,m)=>s+m.utilidadNeta,0);
    const deudaAcum = pf.totalDeuda[cutoffMonth] || 0;
    const utilidadRealAcum = utilidadNetaAcum - deudaAcum;
    const margenNetoAcum = ingresosAcum !== 0 ? utilidadNetaAcum/ingresosAcum : 0;
    const margenRealAcum = ingresosAcum !== 0 ? utilidadRealAcum/ingresosAcum : 0;
    return { monthly, cutoffMonth, ingresosAcum, utilidadNetaAcum, margenNetoAcum, deudaAcum, utilidadRealAcum, margenRealAcum };
  }

  // ---------------- Informe descargable (Resumen + Flujo de Caja + Rentabilidad de un período) ----------------
  // Evolución mensual de Fijos vs Variables (para ver la proporción mes a mes)
  function getComposicionMensual(anio){
    const months = Array.from({length:12}, ()=> ({ fijos:0, variables:0 }));
    state.gastos.forEach(g=>{
      if(!g.fecha) return;
      const d = new Date(g.fecha+'T00:00:00');
      if(d.getFullYear() !== anio) return;
      const m = d.getMonth();
      const monto = Number(g.monto)||0;
      if(g.origenPagoFijo) months[m].fijos += monto;
      else months[m].variables += monto;
    });
    return months.map((m,i)=>{
      const total = m.fijos + m.variables;
      return { mes: MESES[i], mesCorto: MESES_CORTO[i], fijos:m.fijos, variables:m.variables, total,
               pctFijos: total? m.fijos/total : 0, pctVariables: total? m.variables/total : 0 };
    });
  }

  // Matriz de Categoría x Mes, filtrable por tipo ('fijos' | 'variables' | 'todos') — para ver $ o % de cada categoría mes a mes
  function getCategoriaMensual(anio, tipo){
    const gastosAnio = state.gastos.filter(g=> g.fecha && new Date(g.fecha+'T00:00:00').getFullYear()===anio);
    const filtrados = tipo==='todos' ? gastosAnio : gastosAnio.filter(g=> tipo==='fijos' ? !!g.origenPagoFijo : !g.origenPagoFijo);

    const matrix = {};
    state.config.categoriasGastos.forEach(c=> matrix[c] = Array(12).fill(0));
    const totalPorMes = Array(12).fill(0);
    filtrados.forEach(g=>{
      const d = new Date(g.fecha+'T00:00:00');
      const m = d.getMonth();
      const monto = Number(g.monto)||0;
      if(!matrix[g.categoria]) matrix[g.categoria] = Array(12).fill(0);
      matrix[g.categoria][m] += monto;
      totalPorMes[m] += monto;
    });
    const totalAnual = totalPorMes.reduce((s,v)=>s+v,0);
    const cats = Object.keys(matrix)
      .map(cat=>({ cat, total: matrix[cat].reduce((s,v)=>s+v,0) }))
      .filter(c=>c.total>0)
      .sort((a,b)=>b.total-a.total)
      .map(c=>c.cat);
    return { cats, matrix, totalPorMes, totalAnual };
  }

  function getInformeData(anio, mesDesde, mesHasta){
    const months = getMonthlyStats(anio);
    const pf = getPagosFijosStats(anio);
    const periodo = months.slice(mesDesde, mesHasta + 1);

    const ingresosTotal = periodo.reduce((s,m)=>s+m.ingresosTotales,0);
    const gastosTotal = periodo.reduce((s,m)=>s+m.gastosPagados,0);
    const utilidadTotal = ingresosTotal - gastosTotal;
    const margenTotal = ingresosTotal !== 0 ? utilidadTotal/ingresosTotal : 0;
    const saldoInicial = months[mesDesde].saldoInicial;
    const saldoFinal = months[mesHasta].saldoFinal;
    const deudaPF = pf.totalDeuda[mesHasta] || 0;

    const catTotals = {};
    state.config.categoriasGastos.forEach(c=> catTotals[c]=0);
    periodo.forEach(m=> Object.keys(m.gastosPorCategoria).forEach(cat=>{ catTotals[cat] = (catTotals[cat]||0) + m.gastosPorCategoria[cat]; }));

    const periodoLabel = (mesDesde===0 && mesHasta===11) ? `Año ${anio}` : `${MESES[mesDesde]} – ${MESES[mesHasta]} ${anio}`;

    return { anio, mesDesde, mesHasta, periodo, ingresosTotal, gastosTotal, utilidadTotal, margenTotal,
             saldoInicial, saldoFinal, deudaPF, catTotals, periodoLabel };
  }

  // ---------------- Utilidades de orden y filtro (reutilizadas en todas las tablas) ----------------
  const NUMERIC_KEYS = new Set(['monto','montoMensual','mesIdx','ingresos','gastos','utilidad','margen','saldo','saldoInicial','saldoFinal','deuda','pct']);

  function sortRowsGeneric(rows, key, dir, getVal){
    const mult = dir === 'asc' ? 1 : -1;
    const extractor = getVal || ((row,k)=> row[k]);
    return rows.slice().sort((a,b)=>{
      let va = extractor(a,key), vb = extractor(b,key);
      if(NUMERIC_KEYS.has(key)){
        va = Number(va)||0; vb = Number(vb)||0;
      } else {
        va = (va===undefined||va===null? '' : va).toString().toLowerCase();
        vb = (vb===undefined||vb===null? '' : vb).toString().toLowerCase();
      }
      if(va < vb) return -1*mult;
      if(va > vb) return 1*mult;
      return 0;
    });
  }

  function thSort(table, key, label, numeric){
    const ts = state.tables[table];
    const active = ts.sortKey === key;
    const icon = active ? (ts.sortDir==='asc' ? '▲' : '▼') : '↕';
    return `<th class="sortable${numeric?' num':''}" data-action="sort-table" data-table="${table}" data-key="${key}">${label} <span class="fa-sort-icon${active?' active':''}">${icon}</span></th>`;
  }

  function filterBar(table, opts){
    const ts = state.tables[table];
    const hasActive = ts.search || (opts.selects||[]).some(s=> ts[s.field]);
    return `
      <div class="fa-filter-bar" data-form="filter-${table}">
        <input type="text" name="search" placeholder="${opts.placeholder||'Buscar...'}" value="${escapeHtml(ts.search)}">
        <button type="button" class="fa-btn fa-btn-ghost" data-action="apply-search" data-table="${table}">Buscar</button>
        ${(opts.selects||[]).map(s=>`
          <select data-action="filter-select" data-table="${table}" data-field="${s.field}">
            <option value="">${s.allLabel}</option>
            ${s.options.map(o=>`<option value="${escapeHtml(o)}" ${ts[s.field]===o?'selected':''}>${escapeHtml(o)}</option>`).join('')}
          </select>
        `).join('')}
        ${hasActive? `<button type="button" class="fa-btn fa-btn-ghost" data-action="clear-filters" data-table="${table}">Limpiar filtros</button>` : ''}
      </div>
    `;
  }

  // ---------------- Render dispatch ----------------
  function render(){
    if(!state.authChecked){
      root.innerHTML = `<div class="fa-loading">Verificando sesión…</div>`;
      return;
    }
    if(!state.user){
      root.innerHTML = renderLogin();
      return;
    }
    if(!state.role){
      root.innerHTML = renderSinAutorizacion();
      return;
    }
    if(state.loading){
      root.innerHTML = `<div class="fa-loading">Cargando tus datos financieros…</div>`;
      return;
    }
    if(state.error){
      root.innerHTML = `<div class="fa-error">${escapeHtml(state.error)}</div>`;
      return;
    }
    root.className = state.readOnly ? 'fa-readonly' : '';
    root.innerHTML = `
      ${state.readOnly ? `<div class="fa-readonly-banner">👁️ Modo solo lectura — puedes ver todo, pero no editar</div>` : ''}

  function renderConfirmModal(){
    const cd = state.confirmDialog;

    return `
      <div class="fa-modal-overlay" data-action="confirm-cancel">
        <div class="fa-modal" data-action="confirm-noop">
          <div class="fa-modal-message">${escapeHtml(cd.message)}</div>

          <div class="fa-field" style="margin-bottom:16px;">

        </div>
      </div>

  function renderSidebar(){
    const tabs = [
      {id:'resumen', label:'Resumen', icon:'&#9673;'},
      {id:'ingresos', label:'Ingresos', icon:'&#8593;'},
      {id:'gastos', label:'Gastos', icon:'&#8595;'},
      {id:'pagosfijos', label:'Pagos Fijos', icon:'&#8987;'},
      {id:'composicion', label:'Fijos vs Variables', icon:'&#9682;'},
      {id:'flujo', label:'Flujo de Caja', icon:'&#8646;'},
      {id:'rentabilidad', label:'Rentabilidad', icon:'&#9636;'},
      {id:'config', label:'Configuración', icon:'&#9881;'}

    return `
      <div class="fa-sidebar">
        <div class="fa-brand"><span class="dot"></span> Finanzas</div>
        ${tabs.map(t=>`
          <button class="fa-nav-btn ${state.activeTab===t.id?'active':''}" data-action="nav" data-tab="${t.id}">
            <span class="fa-nav-icon">${t.icon}</span>${t.label}

        <button class="fa-sidebar-export fa-sidebar-export-secondary" data-action="logout">&#128274; Cerrar sesión</button>
        <div class="fa-sidebar-footer">
          ${escapeHtml(state.user && state.user.email || '')} · ${state.role === 'viewer' ? 'Solo lectura' : 'Editor'}
        </div>
      </div>
    `;
  }

  function renderTab(){
    switch(state.activeTab){
      case 'resumen': return renderResumen();
      case 'ingresos': return renderIngresos();
      case 'gastos': return renderGastos();
      case 'pagosfijos': return renderPagosFijos();
      case 'composicion': return renderComposicion();
      case 'flujo': return renderFlujo();
      case 'rentabilidad': return renderRentabilidad();
      case 'config': return renderConfig();
      default: return '';
    }
  }

  function yearSelect(name){
    const years = getYearsWithData();
    return `<select class="fa-year-select" data-action="change-anio" data-name="${name}">
      ${years.map(y=>`<option value="${y}" ${y===state.config.anio?'selected':''}>${y}</option>`).join('')}
    </select>`;
  }

  // ---------------- RESUMEN ----------------
  function renderResumen(){
    const months = getMonthlyStats(state.config.anio);
    const ingresosAnio = months.reduce((s,m)=>s+m.ingresosTotales,0);
    const gastosAnio = months.reduce((s,m)=>s+m.gastosPagados,0);
    const utilidadAnio = ingresosAnio - gastosAnio;
    const margenAnio = ingresosAnio !== 0 ? utilidadAnio/ingresosAnio : 0;
    const saldoActual = getSaldoActual();
    const pf = getPagosFijosStats(state.config.anio);
    const deudaPF = pf.totalDeuda[state.mesCortePF] || 0;

    return `
      <div class="fa-topbar">
        <div>
          <h1>Resumen Financiero</h1>
          <div class="fa-sub">Vista general de tu empresa — año ${state.config.anio}</div>
        </div>
        ${yearSelect('resumen')}
      </div>

      <div class="fa-kpi-grid fa-kpi-grid-6">
        <div class="fa-kpi income">
          <div class="fa-kpi-label">Ingresos del año</div>
          <div class="fa-kpi-value income money">${fmtMoneyC(ingresosAnio)}</div>
        </div>
        <div class="fa-kpi expense">
          <div class="fa-kpi-label">Gastos del año</div>
          <div class="fa-kpi-value expense money">${fmtMoneyC(gastosAnio)}</div>
        </div>
        <div class="fa-kpi">
          <div class="fa-kpi-label">Utilidad neta</div>
          <div class="fa-kpi-value money">${fmtMoneyC(utilidadAnio)}</div>
        </div>
        <div class="fa-kpi">
          <div class="fa-kpi-label">Margen neto</div>
          <div class="fa-kpi-value">${fmtPctC(margenAnio)}</div>
        </div>
        <div class="fa-kpi">
          <div class="fa-kpi-label">Saldo de caja actual</div>
          <div class="fa-kpi-value money">${fmtMoneyC(saldoActual)}</div>
        </div>
        <div class="fa-kpi expense">
          <div class="fa-kpi-label">Deuda pagos fijos</div>
          <div class="fa-kpi-value expense money">${fmtMoneyC(deudaPF)}</div>
        </div>
      </div>

      <div class="fa-card">
        <div class="fa-card-title">
          Análisis Real del Negocio
          <select class="fa-year-select" data-action="change-mes-corte-pf">
            ${MESES.map((m,i)=>`<option value="${i}" ${i===state.mesCortePF?'selected':''}>Corte: ${m}</option>`).join('')}
          </select>
        </div>
        <div class="fa-section-note">Tu utilidad contable solo descuenta lo que ya pagaste. Esto también descuenta lo que deberías haber pagado en compromisos fijos hasta ${MESES[state.mesCortePF]} y quedó pendiente — sin contar meses futuros, que todavía no son deuda. La fotografía real de tu rentabilidad acumulada este año, al día de hoy.</div>
        ${(()=>{
          const real = getUtilidadReal(state.config.anio, state.mesCortePF);
          return `
          <div class="fa-real-grid">
            <div class="fa-real-col">
              <div class="fa-real-label">Utilidad Neta acumulada (Ene–${MESES_CORTO[state.mesCortePF]})</div>
              <div class="fa-real-value money">${fmtMoneyC(real.utilidadNetaAcum)}</div>
              <div class="fa-real-sub">Margen neto: ${fmtPctC(real.margenNetoAcum)}</div>
            </div>
            <div class="fa-real-op">−</div>
            <div class="fa-real-col">
              <div class="fa-real-label">Deuda por pagos fijos no pagados (a ${MESES[state.mesCortePF]})</div>
              <div class="fa-real-value money" style="color:var(--expense)">${fmtMoneyC(real.deudaAcum)}</div>
            </div>
            <div class="fa-real-op">=</div>
            <div class="fa-real-col fa-real-highlight">
              <div class="fa-real-label">Utilidad Real acumulada</div>
              <div class="fa-real-value money" style="color:${real.utilidadRealAcum<0?'var(--expense)':'var(--income)'}">${fmtMoneyC(real.utilidadRealAcum)}</div>
              <div class="fa-real-sub" style="font-weight:700; color:var(--ink);">Margen Real: ${fmtPctC(real.margenRealAcum)}</div>
            </div>
          </div>`;
        })()}
      </div>

      <div class="fa-charts-row">
        <div class="fa-card">
          <div class="fa-card-title">Ingresos vs. Gastos por mes</div>
          <div class="fa-chart-box">${svgBarChart(MESES_CORTO, months.map(m=>m.ingresosTotales), months.map(m=>m.gastosPagados), 'Ingresos', 'Gastos')}</div>
        </div>
        <div class="fa-card">
          <div class="fa-card-title">Gastos por categoría (año)</div>
          <div class="fa-chart-box">${(()=>{
            const catTotals = {};
            state.config.categoriasGastos.forEach(c=> catTotals[c]=0);
            months.forEach(m=> Object.keys(m.gastosPorCategoria).forEach(cat=>{ catTotals[cat]=(catTotals[cat]||0)+m.gastosPorCategoria[cat]; }));
            const entries = Object.entries(catTotals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
            return donutChart(entries);
          })()}</div>
        </div>
      </div>

      <div class="fa-card">
        <div class="fa-card-title">Evolución del saldo de caja</div>
        <div class="fa-chart-box">${svgLineChart(MESES_CORTO, months.map(m=>m.saldoFinal), 'Saldo de caja')}</div>
      </div>

      ${(()=>{
        const mensual = getComposicionMensual(state.config.anio);
        return `
      <div class="fa-charts-row">
        <div class="fa-card">
          <div class="fa-card-title">Gastos Fijos vs Variables por mes</div>
          <div class="fa-chart-box">${svgBarChart(mensual.map(m=>m.mesCorto), mensual.map(m=>m.fijos), mensual.map(m=>m.variables), 'Pagos Fijos', 'Variables')}</div>

          <div class="fa-card-title">Evolución del % de Gastos Fijos</div>
          <div class="fa-chart-box">${svgLineChart(mensual.map(m=>m.mesCorto), mensual.map(m=>m.pctFijos), '% Gastos Fijos sobre el total', {
            fmtAxis: (v)=> (v*100).toFixed(0)+'%',
            fmtTooltip: (v)=> (v*100).toFixed(1)+'%',
            minVal: 0, maxVal: 1,
            color: '#A8322D'
          })}</div>
        </div>
      </div>`;
      })()}

      <div class="fa-card">
        <div class="fa-card-title">Detalle mensual ${state.config.anio}</div>
        ${filterBar('resumenMensual', { placeholder:'Buscar mes...' })}
        ${(()=>{
          let rows = months.map((m,i)=>({ mesIdx:i, mes:MESES[i], ingresos:m.ingresosTotales, gastos:m.gastosPagados, utilidad:m.utilidadNeta, margen:m.margen, saldo:m.saldoFinal }));
          const ts = state.tables.resumenMensual;
          if(ts.search) rows = rows.filter(r=> r.mes.toLowerCase().includes(ts.search.toLowerCase()));
          rows = sortRowsGeneric(rows, ts.sortKey, ts.sortDir);
          return `
        <div class="fa-table-wrap">
          <table class="fa-table">
            <thead><tr>
              ${thSort('resumenMensual','mesIdx','Mes')}${thSort('resumenMensual','ingresos','Ingresos',true)}${thSort('resumenMensual','gastos','Gastos',true)}${thSort('resumenMensual','utilidad','Utilidad',true)}${thSort('resumenMensual','margen','Margen',true)}${thSort('resumenMensual','saldo','Saldo de caja',true)}
            </tr></thead>
            <tbody>
              ${rows.map(r=>`
                <tr>
                  <td>${r.mes}</td>
                  <td class="num money">${fmtMoneyC(r.ingresos)}</td>
                  <td class="num money">${fmtMoneyC(r.gastos)}</td>
                  <td class="num money">${fmtMoneyC(r.utilidad)}</td>
                  <td class="num">${fmtPctC(r.margen)}</td>
                  <td class="num money">${fmtMoneyC(r.saldo)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`;
        })()}
      </div>

      <div class="fa-card">
        <div class="fa-card-title">Descargar Informe (Resumen · Flujo de Caja · Rentabilidad)</div>
        <div class="fa-section-note">Genera un informe con gráficos para enviar a tu directorio o contador. Elige el período y el formato.</div>
        <div class="fa-informe-period">
          <label style="font-size:12px; color:var(--muted); font-weight:600;">Desde</label>
          <select data-action="change-informe-desde">
            ${MESES.map((m,i)=>`<option value="${i}" ${i===state.informe.mesDesde?'selected':''}>${m}</option>`).join('')}
          </select>
          <label style="font-size:12px; color:var(--muted); font-weight:600;">Hasta</label>
          <select data-action="change-informe-hasta">
            ${MESES.map((m,i)=>`<option value="${i}" ${i===state.informe.mesHasta?'selected':''}>${m}</option>`).join('')}
          </select>
          <span class="fa-hint" style="margin:0;">${state.config.anio}</span>
        </div>
        <div class="fa-informe-actions">
          <button type="button" class="fa-btn fa-btn-ghost" data-action="informe-csv">⬇ CSV</button>
          <button type="button" class="fa-btn fa-btn-ghost" data-action="informe-excel">⬇ Excel</button>
          <button type="button" class="fa-btn fa-btn-ghost" data-action="informe-pdf">⬇ PDF</button>
          <button type="button" class="fa-btn fa-btn-ghost" data-action="informe-jpg">⬇ JPG</button>
          <button type="button" class="fa-btn fa-btn-primary" data-action="informe-ppt">⬇ PowerPoint</button>
        </div>
        <div class="fa-hint">El PDF se genera con el diálogo de impresión de tu navegador — elige "Guardar como PDF" como destino. JPG y PowerPoint incluyen los gráficos como imagen.</div>
      </div>
    `;
  }

  // ---------------- INGRESOS ----------------
  function renderIngresos(){
    const editing = state.ingresos.find(i=>i.id===state.editingIngresoId);
    const delAnio = state.ingresos.filter(i=> i.fecha && new Date(i.fecha+'T00:00:00').getFullYear()===state.config.anio);
    const totalPagado = delAnio.filter(i=>i.estado==='Pagado').reduce((s,i)=>s+(Number(i.monto)||0),0);
    const totalPendiente = delAnio.filter(i=>i.estado==='Pendiente').reduce((s,i)=>s+(Number(i.monto)||0),0);

    const ts = state.tables.ingresos;
    let list = delAnio.slice();
    if(ts.categoria) list = list.filter(i=>i.categoria===ts.categoria);
    if(ts.estado) list = list.filter(i=>i.estado===ts.estado);
    if(ts.mes){
      const mesIdx = MESES.indexOf(ts.mes);
      list = list.filter(i=>{
        if(!i.fecha) return false;
        const d = new Date(i.fecha+'T00:00:00');
        return d.getMonth()===mesIdx;
      });
    }
    if(ts.search){
      const s = ts.search.toLowerCase();
      list = list.filter(i=> `${i.cliente||''} ${i.descripcion||''}`.toLowerCase().includes(s));
    }
    list = sortRowsGeneric(list, ts.sortKey, ts.sortDir);

    return `
      <div class="fa-topbar">
        <div><h1>Ingresos</h1><div class="fa-sub">Registra cada cobro apenas ocurra — el resto se actualiza solo. Mostrando año ${state.config.anio}.</div></div>
        ${yearSelect('ingresos')}
      </div>

      <div class="fa-kpi-grid" style="grid-template-columns:repeat(2,1fr); max-width:420px;">
        <div class="fa-kpi income"><div class="fa-kpi-label">Total cobrado (${state.config.anio})</div><div class="fa-kpi-value income money">${fmtMoneyC(totalPagado)}</div></div>
        <div class="fa-kpi"><div class="fa-kpi-label">Pendiente de cobro (${state.config.anio})</div><div class="fa-kpi-value money">${fmtMoneyC(totalPendiente)}</div></div>
      </div>

      <div class="fa-card">
        <div class="fa-card-title">${editing? 'Editar ingreso' : 'Agregar ingreso'}</div>
        <div data-form="ingreso">
          <div class="fa-form-grid">
            <div class="fa-field"><label>Fecha</label><input type="date" name="fecha" value="${editing? editing.fecha : todayISO()}"></div>
            <div class="fa-field"><label>Cliente</label><input type="text" name="cliente" placeholder="Nombre del cliente" value="${editing? escapeHtml(editing.cliente):''}"></div>
            <div class="fa-field"><label>Descripción</label><input type="text" name="descripcion" placeholder="Ej: Proyecto X" value="${editing? escapeHtml(editing.descripcion):''}"></div>
            <div class="fa-field"><label>Categoría</label>
              <select name="categoria">${state.config.categoriasIngresos.map(c=>`<option ${editing && editing.categoria===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select>
            </div>
            <div class="fa-field"><label>Monto</label><input type="number" name="monto" min="0" step="1" placeholder="0" value="${editing? editing.monto:''}"></div>
            <div class="fa-field"><label>Estado</label>
              <select name="estado">
                <option ${editing && editing.estado==='Pagado' ? 'selected':''}>Pagado</option>
                <option ${editing && editing.estado==='Pendiente' ? 'selected':''}>Pendiente</option>
              </select>
            </div>
          </div>
          <div class="fa-form-actions">
            <button type="button" class="fa-btn fa-btn-primary" data-action="submit-ingreso">${editing? 'Guardar cambios':'Agregar ingreso'}</button>
            ${editing? `<button type="button" class="fa-btn fa-btn-ghost" data-action="cancel-edit-ingreso">Cancelar</button>` : ''}
          </div>
        </div>
      </div>

      <div class="fa-card">
        <div class="fa-card-title">
          Ingresos ${state.config.anio} (${delAnio.length})
          <span>
            <button class="fa-btn fa-btn-ghost" data-action="import-csv-ingresos">Importar CSV</button>
            ${state.ingresos.length ? `<button class="fa-btn fa-btn-ghost" data-action="export-ingresos">Descargar CSV</button>` : ''}
          </span>
        </div>
        <input type="file" id="fa-import-csv-ingresos" data-action="import-csv-ingresos-file" accept=".csv,text/csv" style="display:none;">
        <div class="fa-hint" style="margin-top:-6px; margin-bottom:10px;">El CSV debe tener columnas: Fecha, Cliente, Descripción, Categoría, Monto, Estado (exporta uno de ejemplo con "Descargar CSV" para ver el formato). "Descargar CSV" incluye todos los años; al importar, cada fila se ordena sola según su fecha.</div>
        ${delAnio.length === 0 ? `<div class="fa-empty">Aún no registras ingresos en ${state.config.anio}. Agrega el primero arriba, o cambia de año arriba a la derecha si buscabas otro período.</div>` : `
        ${filterBar('ingresos', { placeholder:'Buscar cliente o descripción...', selects:[
          {field:'mes', allLabel:`Todos los meses (${state.config.anio})`, options: MESES},
          {field:'categoria', allLabel:'Todas las categorías', options: state.config.categoriasIngresos},
          {field:'estado', allLabel:'Todos los estados', options:['Pagado','Pendiente']}
        ]})}
        <div class="fa-filter-count">Mostrando ${list.length} de ${delAnio.length}</div>
        ${list.length === 0 ? `<div class="fa-empty">Ningún ingreso coincide con el filtro.</div>` : `
        ${state.selected.ingresos.size > 0 ? `
        <div class="fa-bulk-bar">
          <span class="fa-bulk-count">${state.selected.ingresos.size} seleccionado${state.selected.ingresos.size===1?'':'s'}</span>
          <button type="button" class="fa-btn fa-btn-danger" data-action="bulk-delete-ingresos">Eliminar seleccionados</button>
          <button type="button" class="fa-btn fa-btn-ghost" data-action="clear-selection-ingresos">Deseleccionar todo</button>

          <table class="fa-table">

              <th class="fa-checkbox-col"><input type="checkbox" data-action="toggle-select-all-ingresos" data-ids="${list.map(i=>i.id).join(',')}" ${list.length>0 && list.every(i=>state.selected.ingresos.has(i.id))?'checked':''}></th>
              ${thSort('ingresos','fecha','Fecha')}${thSort('ingresos','cliente','Cliente')}${thSort('ingresos','descripcion','Descripción')}${thSort('ingresos','categoria','Categoría')}${thSort('ingresos','monto','Monto',true)}${thSort('ingresos','estado','Estado')}<th></th>
            </tr></thead>
            <tbody>
              ${list.map(i=>`
                <tr class="income-row">
                  <td class="fa-checkbox-col"><input type="checkbox" data-action="toggle-select-ingreso" data-id="${i.id}" ${state.selected.ingresos.has(i.id)?'checked':''}></td>
                  <td>${fmtDate(i.fecha)}</td>
                  <td>${escapeHtml(i.cliente)||'—'}</td>
                  <td>${escapeHtml(i.descripcion)||'—'}</td>
                  <td>${escapeHtml(i.categoria)}</td>
                  <td class="num money">${fmtMoneyC(i.monto)}</td>
                  <td><span class="fa-badge ${i.estado==='Pagado'?'pagado':'pendiente'}">${i.estado}</span></td>
                  <td>
                    <div class="fa-row-actions">
                      <button class="fa-icon-btn" data-action="edit-ingreso" data-id="${i.id}">Editar</button>
                      <button class="fa-icon-btn danger" data-action="delete-ingreso" data-id="${i.id}">Eliminar</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`}`}
      </div>
    `;
  }

  // ---------------- GASTOS ----------------
  function renderGastos(){
    const editing = state.gastos.find(g=>g.id===state.editingGastoId);
    const delAnio = state.gastos.filter(g=> g.fecha && new Date(g.fecha+'T00:00:00').getFullYear()===state.config.anio);
    const total = delAnio.reduce((s,g)=>s+(Number(g.monto)||0),0);

    const ts = state.tables.gastos;
    let list = delAnio.slice();
    if(ts.categoria) list = list.filter(g=>g.categoria===ts.categoria);
    if(ts.metodo) list = list.filter(g=>g.metodo===ts.metodo);
    if(ts.tipo) list = list.filter(g=> ts.tipo==='Fijo' ? !!g.origenPagoFijo : !g.origenPagoFijo);
    if(ts.mes){
      const mesIdx = MESES.indexOf(ts.mes);
      list = list.filter(g=>{
        if(!g.fecha) return false;
        const d = new Date(g.fecha+'T00:00:00');
        return d.getMonth()===mesIdx;
      });
    }
    if(ts.search){
      const s = ts.search.toLowerCase();
      list = list.filter(g=> `${g.proveedor||''} ${g.descripcion||''}`.toLowerCase().includes(s));
    }
    list = sortRowsGeneric(list, ts.sortKey, ts.sortDir);

    return `
      <div class="fa-topbar">
        <div><h1>Gastos</h1><div class="fa-sub">Registra cada gasto apenas ocurra. Mostrando año ${state.config.anio}.</div></div>
        ${yearSelect('gastos')}
      </div>

      <div class="fa-kpi-grid" style="grid-template-columns:repeat(1,1fr); max-width:220px;">
        <div class="fa-kpi expense"><div class="fa-kpi-label">Total gastado (${state.config.anio})</div><div class="fa-kpi-value expense money">${fmtMoneyC(total)}</div></div>
      </div>

      <div class="fa-card">
        <div class="fa-card-title">${editing? 'Editar gasto' : 'Agregar gasto'}</div>
        <div data-form="gasto">
          <div class="fa-form-grid">
            <div class="fa-field"><label>Fecha</label><input type="date" name="fecha" value="${editing? editing.fecha : todayISO()}"></div>
            <div class="fa-field"><label>Proveedor</label><input type="text" name="proveedor" placeholder="Nombre del proveedor" value="${editing? escapeHtml(editing.proveedor):''}"></div>
            <div class="fa-field"><label>Descripción</label><input type="text" name="descripcion" placeholder="Ej: Arriendo enero" value="${editing? escapeHtml(editing.descripcion):''}"></div>
            <div class="fa-field"><label>Categoría</label>
              <select name="categoria">${state.config.categoriasGastos.map(c=>`<option ${editing && editing.categoria===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select>
            </div>
            <div class="fa-field"><label>Monto</label><input type="number" name="monto" min="0" step="1" placeholder="0" value="${editing? editing.monto:''}"></div>
            <div class="fa-field"><label>Método de pago</label>
              <select name="metodo">${state.config.metodosPago.map(m=>`<option ${editing && editing.metodo===m?'selected':''}>${escapeHtml(m)}</option>`).join('')}</select>
            </div>
          </div>
          <div class="fa-form-actions">
            <button type="button" class="fa-btn fa-btn-primary" data-action="submit-gasto">${editing? 'Guardar cambios':'Agregar gasto'}</button>
            ${editing? `<button type="button" class="fa-btn fa-btn-ghost" data-action="cancel-edit-gasto">Cancelar</button>` : ''}
          </div>
        </div>
      </div>

      <div class="fa-card">
        <div class="fa-card-title">
          Gastos ${state.config.anio} (${delAnio.length})
          <span>
            <button class="fa-btn fa-btn-ghost" data-action="import-csv-gastos">Importar CSV</button>
            ${state.gastos.length ? `<button class="fa-btn fa-btn-ghost" data-action="export-gastos">Descargar CSV</button>` : ''}
          </span>
        </div>
        <input type="file" id="fa-import-csv-gastos" data-action="import-csv-gastos-file" accept=".csv,text/csv" style="display:none;">
        <div class="fa-hint" style="margin-top:-6px; margin-bottom:10px;">El CSV debe tener columnas: Fecha, Proveedor, Descripción, Categoría, Monto, Método (exporta uno de ejemplo con "Descargar CSV" para ver el formato). "Descargar CSV" incluye todos los años.</div>
        ${delAnio.length === 0 ? `<div class="fa-empty">Aún no registras gastos en ${state.config.anio}. Agrega el primero arriba, o cambia de año arriba a la derecha si buscabas otro período.</div>` : `
        ${filterBar('gastos', { placeholder:'Buscar proveedor o descripción...', selects:[
          {field:'mes', allLabel:`Todos los meses (${state.config.anio})`, options: MESES},
          {field:'tipo', allLabel:'Fijos y Variables', options: ['Fijo','Variable']},
          {field:'categoria', allLabel:'Todas las categorías', options: state.config.categoriasGastos},
          {field:'metodo', allLabel:'Todos los métodos', options: state.config.metodosPago}
        ]})}
        <div class="fa-filter-count">Mostrando ${list.length} de ${delAnio.length}</div>
        ${list.length === 0 ? `<div class="fa-empty">Ningún gasto coincide con el filtro.</div>` : `
        ${state.selected.gastos.size > 0 ? `
        <div class="fa-bulk-bar">
          <span class="fa-bulk-count">${state.selected.gastos.size} seleccionado${state.selected.gastos.size===1?'':'s'}</span>
          <button type="button" class="fa-btn fa-btn-danger" data-action="bulk-delete-gastos">Eliminar seleccionados</button>
          <button type="button" class="fa-btn fa-btn-ghost" data-action="clear-selection-gastos">Deseleccionar todo</button>
        </div>` : ''}
        <div class="fa-table-wrap">
          <table class="fa-table">
            <thead><tr>
              <th class="fa-checkbox-col"><input type="checkbox" data-action="toggle-select-all-gastos" data-ids="${list.map(g=>g.id).join(',')}" ${list.length>0 && list.every(g=>state.selected.gastos.has(g.id))?'checked':''}></th>
              ${thSort('gastos','fecha','Fecha')}${thSort('gastos','proveedor','Proveedor')}${thSort('gastos','descripcion','Descripción')}${thSort('gastos','categoria','Categoría')}${thSort('gastos','monto','Monto',true)}${thSort('gastos','metodo','Método')}<th></th>
            </tr></thead>
            <tbody>
              ${list.map(g=>`
                <tr class="expense-row">
                  <td class="fa-checkbox-col"><input type="checkbox" data-action="toggle-select-gasto" data-id="${g.id}" ${state.selected.gastos.has(g.id)?'checked':''}></td>
                  <td>${fmtDate(g.fecha)}</td>
                  <td>${escapeHtml(g.proveedor)||'—'}</td>
                  <td>${escapeHtml(g.descripcion)||'—'}${g.origenPagoFijo?' <span class="fa-badge" style="background:#EEF0FF;color:var(--ink-soft);">🔗 Pago fijo</span>':''}</td>
                  <td>${escapeHtml(g.categoria)}</td>
                  <td class="num money">${fmtMoneyC(g.monto)}</td>
                  <td>${escapeHtml(g.metodo)||'—'}</td>
                  <td>
                    <div class="fa-row-actions">
                      <button class="fa-icon-btn" data-action="edit-gasto" data-id="${g.id}">Editar</button>
                      <button class="fa-icon-btn danger" data-action="delete-gasto" data-id="${g.id}">Eliminar</button>
                    </div>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`}`}
      </div>
    `;
  }

  // ---------------- COMPOSICIÓN DE GASTOS (Fijos vs Variables) ----------------
  function renderComposicion(){
    const delAnio = state.gastos.filter(g=> g.fecha && new Date(g.fecha+'T00:00:00').getFullYear()===state.config.anio);
    const fijos = delAnio.filter(g=>g.origenPagoFijo);
    const variables = delAnio.filter(g=>!g.origenPagoFijo);
    const totalFijos = fijos.reduce((s,g)=>s+(Number(g.monto)||0),0);
    const totalVariables = variables.reduce((s,g)=>s+(Number(g.monto)||0),0);
    const total = totalFijos + totalVariables;
    const pctFijos = total ? totalFijos/total : 0;
    const pctVariables = total ? totalVariables/total : 0;

    const catFijos = {}, catVariables = {};
    fijos.forEach(g=>{ catFijos[g.categoria] = (catFijos[g.categoria]||0) + (Number(g.monto)||0); });
    variables.forEach(g=>{ catVariables[g.categoria] = (catVariables[g.categoria]||0) + (Number(g.monto)||0); });
    const entriesFijos = Object.entries(catFijos).sort((a,b)=>b[1]-a[1]);
    const entriesVariables = Object.entries(catVariables).sort((a,b)=>b[1]-a[1]);

    const ts = state.tables.composicion;
    let list = delAnio.slice();
    if(ts.tipo) list = list.filter(g=> ts.tipo==='Fijo' ? !!g.origenPagoFijo : !g.origenPagoFijo);
    if(ts.categoria) list = list.filter(g=>g.categoria===ts.categoria);
    if(ts.metodo) list = list.filter(g=>g.metodo===ts.metodo);
    if(ts.mes){
      const mesIdx = MESES.indexOf(ts.mes);
      list = list.filter(g=>{
        if(!g.fecha) return false;
        return new Date(g.fecha+'T00:00:00').getMonth()===mesIdx;
      });
    }
    if(ts.search){
      const s = ts.search.toLowerCase();
      list = list.filter(g=> `${g.proveedor||''} ${g.descripcion||''}`.toLowerCase().includes(s));
    }
    list = sortRowsGeneric(list, ts.sortKey, ts.sortDir);

    return `
      <div class="fa-topbar">
        <div><h1>Fijos vs Variables</h1><div class="fa-sub">Proporción y detalle entre tus pagos fijos y el resto de tus gastos.</div></div>
        ${yearSelect('composicion')}
      </div>

      <div class="fa-kpi-grid" style="grid-template-columns:repeat(4,1fr); max-width:900px;">
        <div class="fa-kpi expense"><div class="fa-kpi-label">Total gastado (${state.config.anio})</div><div class="fa-kpi-value expense money">${fmtMoneyC(total)}</div></div>
        <div class="fa-kpi"><div class="fa-kpi-label">Pagos Fijos</div><div class="fa-kpi-value money">${fmtMoneyC(totalFijos)}</div><div class="fa-kpi-sub" style="font-size:11px;color:var(--muted);margin-top:2px;">${fmtPct(pctFijos)} del total</div></div>
        <div class="fa-kpi"><div class="fa-kpi-label">Variables / Otros</div><div class="fa-kpi-value money">${fmtMoneyC(totalVariables)}</div><div class="fa-kpi-sub" style="font-size:11px;color:var(--muted);margin-top:2px;">${fmtPct(pctVariables)} del total</div></div>
        <div class="fa-kpi"><div class="fa-kpi-label">N° de movimientos</div><div class="fa-kpi-value">${fijos.length} fijos · ${variables.length} var.</div></div>
      </div>

      ${(()=>{
        const mensual = getComposicionMensual(state.config.anio);
        return `
      <div class="fa-charts-row">
        <div class="fa-card">
          <div class="fa-card-title">Fijos vs Variables por mes (monto)</div>
          <div class="fa-chart-box">${svgBarChart(mensual.map(m=>m.mesCorto), mensual.map(m=>m.fijos), mensual.map(m=>m.variables), 'Pagos Fijos', 'Variables')}</div>
        </div>
        <div class="fa-card">
          <div class="fa-card-title">Evolución del % de Gastos Fijos</div>
          <div class="fa-chart-box">${svgLineChart(mensual.map(m=>m.mesCorto), mensual.map(m=>m.pctFijos), '% Gastos Fijos sobre el total', {
            fmtAxis: (v)=> (v*100).toFixed(0)+'%',
            fmtTooltip: (v)=> (v*100).toFixed(1)+'%',
            minVal: 0, maxVal: 1,
            color: '#A8322D'
          })}</div>
        </div>
      </div>

      <div class="fa-card">
        <div class="fa-card-title">Detalle mensual — Fijos vs Variables</div>
        <div class="fa-table-wrap">
          <table class="fa-table">
            <thead><tr>
              <th>Mes</th><th class="num">Pagos Fijos</th><th class="num">Variables</th><th class="num">Total</th><th class="num">% Fijos</th><th class="num">% Variables</th>
            </tr></thead>
            <tbody>
              ${mensual.map(m=>`
                <tr>
                  <td>${m.mes}</td>
                  <td class="num money">${fmtMoneyC(m.fijos)}</td>
                  <td class="num money">${fmtMoneyC(m.variables)}</td>
                  <td class="num money">${fmtMoneyC(m.total)}</td>
                  <td class="num">${fmtPct(m.pctFijos)}</td>
                  <td class="num">${fmtPct(m.pctVariables)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
      })()}

      <div class="fa-charts-row">
        <div class="fa-card">
          <div class="fa-card-title">Proporción Fijos vs Variables</div>
          <div class="fa-chart-box">${donutChart([['Pagos Fijos', totalFijos], ['Variables / Otros', totalVariables]].filter(([,v])=>v>0))}</div>
        </div>
        <div class="fa-card">
          <div class="fa-card-title">Categorías dentro de Pagos Fijos</div>
          <div class="fa-chart-box">${donutChart(entriesFijos.filter(([,v])=>v>0))}</div>
        </div>
      </div>

      <div class="fa-card">
        <div class="fa-card-title">Categorías dentro de Variables / Otros</div>
        <div class="fa-chart-box">${donutChart(entriesVariables.filter(([,v])=>v>0))}</div>
      </div>

      ${(()=>{
        const cv = state.composicionVista;
        const cm = getCategoriaMensual(state.config.anio, cv.tipo);
        const esPorcentaje = cv.modo === 'porcentaje';
        const tipoLabel = cv.tipo==='fijos' ? 'Pagos Fijos' : (cv.tipo==='variables' ? 'Variables / Otros' : 'Todos los Gastos');
        return `
      <div class="fa-card">
        <div class="fa-card-title">
          Detalle por Categoría y Mes
          <span>
            <select class="fa-year-select" data-action="change-composicion-tipo">
              <option value="fijos" ${cv.tipo==='fijos'?'selected':''}>Solo Pagos Fijos</option>
              <option value="variables" ${cv.tipo==='variables'?'selected':''}>Solo Variables</option>
              <option value="todos" ${cv.tipo==='todos'?'selected':''}>Todos los Gastos</option>
            </select>
            <select class="fa-year-select" data-action="change-composicion-modo">
              <option value="monto" ${cv.modo==='monto'?'selected':''}>Ver en $</option>
              <option value="porcentaje" ${cv.modo==='porcentaje'?'selected':''}>Ver en %</option>
            </select>
          </span>
        </div>
        <div class="fa-section-note">Cómo se distribuye cada categoría de "${tipoLabel}" mes a mes${esPorcentaje? ', como % del total de ese mes (dentro de '+tipoLabel+')' : ', en monto'}.</div>
        ${cm.cats.length === 0 ? `<div class="fa-empty">No hay movimientos de "${tipoLabel}" en ${state.config.anio}.</div>` : `
        <div class="fa-table-wrap">
          <table class="fa-table">
            <thead><tr>
              <th>Categoría</th>${MESES_CORTO.map(m=>`<th class="num">${m}</th>`).join('')}<th class="num">Total</th>
            </tr></thead>
            <tbody>
              ${cm.cats.map(cat=>{
                const fila = cm.matrix[cat];
                const totalCat = fila.reduce((s,v)=>s+v,0);
                return `<tr>
                  <td>${escapeHtml(cat)}</td>
                  ${fila.map((v,m)=>`<td class="num money">${esPorcentaje ? fmtPctC(cm.totalPorMes[m]? v/cm.totalPorMes[m] : 0) : fmtMoneyC(v)}</td>`).join('')}
                  <td class="num money" style="font-weight:700;">${esPorcentaje ? fmtPct(cm.totalAnual? totalCat/cm.totalAnual : 0) : fmtMoney(totalCat)}</td>
                </tr>`;
              }).join('')}
              <tr style="font-weight:700; background:#F8F9FA;">
                <td>TOTAL ${tipoLabel.toUpperCase()}</td>
                ${cm.totalPorMes.map(v=>`<td class="num money">${esPorcentaje ? fmtPct(v?1:0) : fmtMoney(v)}</td>`).join('')}
                <td class="num money">${esPorcentaje ? fmtPct(1) : fmtMoney(cm.totalAnual)}</td>
              </tr>
            </tbody>
          </table>
        </div>`}
      </div>`;
      })()}

      <div class="fa-card">
        <div class="fa-card-title">Detalle de movimientos</div>
        ${filterBar('composicion', { placeholder:'Buscar proveedor o descripción...', selects:[
          {field:'mes', allLabel:`Todos los meses (${state.config.anio})`, options: MESES},
          {field:'tipo', allLabel:'Fijos y Variables', options: ['Fijo','Variable']},
          {field:'categoria', allLabel:'Todas las categorías', options: state.config.categoriasGastos},
          {field:'metodo', allLabel:'Todos los métodos', options: state.config.metodosPago}
        ]})}
        <div class="fa-filter-count">Mostrando ${list.length} de ${delAnio.length}</div>
        ${list.length === 0 ? `<div class="fa-empty">Ningún movimiento coincide con el filtro.</div>` : `
        <div class="fa-table-wrap">
          <table class="fa-table">
            <thead><tr>
              ${thSort('composicion','fecha','Fecha')}<th>Tipo</th>${thSort('composicion','proveedor','Proveedor')}${thSort('composicion','descripcion','Descripción')}${thSort('composicion','categoria','Categoría')}${thSort('composicion','monto','Monto',true)}${thSort('composicion','metodo','Método')}
            </tr></thead>
            <tbody>
              ${list.map(g=>`
                <tr class="${g.origenPagoFijo?'':'expense-row'}">
                  <td>${fmtDate(g.fecha)}</td>
                  <td>${g.origenPagoFijo ? '<span class="fa-badge" style="background:#EEF0FF;color:var(--ink-soft);">🔗 Fijo</span>' : '<span class="fa-badge pendiente">Variable</span>'}</td>
                  <td>${escapeHtml(g.proveedor)||'—'}</td>
                  <td>${escapeHtml(g.descripcion)||'—'}</td>
                  <td>${escapeHtml(g.categoria)}</td>
                  <td class="num money">${fmtMoneyC(g.monto)}</td>
                  <td>${escapeHtml(g.metodo)||'—'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>`}
      </div>
    `;
  }

  // ---------------- PAGOS FIJOS ----------------
  function renderPagosFijos(){
    const anio = state.config.anio;
    const pf = getPagosFijosStats(anio);
    const editing = state.pagosFijosCatalogo.find(c=>c.id===state.editingPFId);
    const mesCorte = state.mesCortePF;
    const deudaFecha = pf.totalDeuda[mesCorte] || 0;

    return `
      <div class="fa-topbar">
        <div><h1>Pagos Fijos</h1><div class="fa-sub">Marca "Pagado" o "Pendiente" cada mes — la deuda se calcula sola.</div></div>
        ${yearSelect('pagosfijos')}
      </div>

      <div class="fa-card">
        <div class="fa-card-title">${editing? 'Editar compromiso fijo' : 'Agregar compromiso fijo'}</div>
        <div data-form="pf">
          <div class="fa-form-grid" style="grid-template-columns:1.8fr 1.6fr 1fr 1.1fr 1.1fr;">
            <div class="fa-field"><label>Concepto</label><input type="text" name="concepto" placeholder="Ej: Arriendo oficina" value="${editing? escapeHtml(editing.concepto):''}"></div>
            <div class="fa-field"><label>Categoría</label>
              <select name="categoria">${state.config.categoriasGastos.map(c=>`<option ${editing && editing.categoria===c?'selected':''}>${escapeHtml(c)}</option>`).join('')}</select>
            </div>
            <div class="fa-field"><label>Monto mensual</label><input type="number" name="montoMensual" min="0" step="1" placeholder="0" value="${editing? editing.montoMensual:''}"></div>
            <div class="fa-field"><label>Fecha de inicio (opcional)</label><input type="date" name="fechaInicio" value="${editing && editing.fechaInicio? editing.fechaInicio:''}"></div>
            <div class="fa-field"><label>Vigente hasta (opcional)</label><input type="date" name="vigenteHasta" value="${editing && editing.vigenteHasta? editing.vigenteHasta:''}"></div>
          </div>
          <div class="fa-form-actions">
            <button type="button" class="fa-btn fa-btn-primary" data-action="submit-pf">${editing? 'Guardar cambios':'Agregar compromiso'}</button>
            ${editing? `<button type="button" class="fa-btn fa-btn-ghost" data-action="cancel-edit-pf">Cancelar</button>` : ''}
          </div>
          <div class="fa-hint">Deja "Fecha de inicio" y "Vigente hasta" vacías si el compromiso no tiene fechas límite. Fuera de ese rango, el mes deja de contarse como pendiente.</div>
        </div>
      </div>

      ${pf.items.length === 0 ? `
      <div class="fa-card"><div class="fa-empty">Aún no agregas compromisos fijos. Agrega el primero arriba (arriendo, sueldos, software, etc.).</div></div>
      ` : `
      <div class="fa-card">
        <div class="fa-card-title">Estado de pago por mes — ${anio}</div>
        ${filterBar('pfEstado', { placeholder:'Buscar concepto...' })}
        ${(()=>{
          const tsPE = state.tables.pfEstado;
          let rows = pf.items.slice();
          if(tsPE.search) rows = rows.filter(it=> it.catalogo.concepto.toLowerCase().includes(tsPE.search.toLowerCase()));
          const mult = tsPE.sortDir==='asc'?1:-1;
          rows.sort((a,b)=>{
            let va,vb;
            if(tsPE.sortKey==='pagados'){
              va = a.estados.filter(e=>e==='Pagado').length; vb = b.estados.filter(e=>e==='Pagado').length;
            } else {
              va = a.catalogo.concepto.toLowerCase(); vb = b.catalogo.concepto.toLowerCase();
            }
            if(va<vb) return -1*mult; if(va>vb) return 1*mult; return 0;
          });
          return `
        <div class="fa-table-wrap">
          <table class="fa-table">
            <thead><tr>
              ${thSort('pfEstado','concepto','Concepto')}${MESES_CORTO.map(m=>`<th class="num">${m}</th>`).join('')}${thSort('pfEstado','pagados','Pagados',true)}<th></th>
            </tr></thead>
            <tbody>
              ${rows.map(it=>{
                const vigenciaTexto = [
                  it.catalogo.fechaInicio ? `Desde ${fmtDate(it.catalogo.fechaInicio)}` : '',
                  it.catalogo.vigenteHasta ? `Hasta ${fmtDate(it.catalogo.vigenteHasta)}` : ''
                ].filter(Boolean).join(' · ');
                return `
                <tr>
                  <td>${escapeHtml(it.catalogo.concepto)}<div class="fa-hint" style="margin:0">${fmtMoneyC(it.monto)}/mes${vigenciaTexto? ` · ${vigenciaTexto}`:''}</div></td>
                  ${it.estados.map((est,m)=>{
                    const vig = getEstadoVigenciaPF(it.catalogo, anio, m);
                    if(vig !== 'activo'){
                      return `<td style="text-align:center; color:var(--muted); font-size:11px;">${vig==='antes'?'aún no inicia':'vencido'}</td>`;
                    }

  // ---------------- CSV export ----------------
  function downloadCsv(filename, rows){
    const csv = rows.map(r => r.map(v=>{
      const s = String(v===undefined||v===null?'':v).replace(/"/g,'""');
      return /[",\n;]/.test(s) ? `"${s}"` : s;
    }).join(';')).join('\n');
    const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // ---------------- Exportar a Excel (snapshot con los datos actuales de la app) ----------------
  function M(v){ return { v: Math.round(Number(v)||0), fmt:'money' }; }
  function P(v){ return { v: Number(v)||0, fmt:'pct' }; }

  function buildSheet(rows, colWidths){
    const aoa = rows.map(row => row.map(c => (c && typeof c === 'object' && 'v' in c) ? c.v : (c===undefined?'':c)));
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    rows.forEach((row, r) => {
      row.forEach((c, cIdx) => {
        if(c && typeof c === 'object' && c.fmt){
          const addr = XLSX.utils.encode_cell({r, c:cIdx});
          if(!ws[addr]) return;
          if(c.fmt === 'money') ws[addr].z = '"$"#,##0';
          else if(c.fmt === 'pct') ws[addr].z = '0.0%';
        }
      });
    });
    if(colWidths) ws['!cols'] = colWidths.map(w=>({wch:w}));
    return ws;
  }

  function exportToExcel(){
    if(!window.XLSX){ showToast('La librería de Excel aún está cargando, intenta de nuevo en un segundo.'); return; }
    try{
      const anio = state.config.anio;
      const months = getMonthlyStats(anio);

      const ingresosAnio = months.reduce((s,m)=>s+m.ingresosTotales,0);

      const saldoActual = getSaldoActual();

  async function exportInformeJpg(){
    if(!window.html2canvas){ showToast('La librería de imagen aún está cargando, intenta de nuevo en un segundo.'); return; }
    const container = getOrCreateInformeContainer();
    try{
      const data = getInformeData(state.config.anio, state.informe.mesDesde, state.informe.mesHasta);
      container.innerHTML = buildInformeHtml(data);
      container.style.cssText = 'display:block; position:fixed; left:-9999px; top:0; z-index:-1;';
      await new Promise(r=>setTimeout(r, 80));
      const canvas = await html2canvas(container.firstElementChild, {scale:2, backgroundColor:'#ffffff', useCORS:true});

          if(!blob){ showToast('No se pudo generar la imagen.'); resolve(); return; }
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `informe_financiero_${state.config.anio}.jpg`;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
          showToast('Imagen JPG del informe descargada');
          resolve();
        }, 'image/jpeg', 0.92);
      });
    } catch(err){
      console.error('Informe JPG error', err);
      showToast('No se pudo generar la imagen del informe.');
    } finally {
      container.style.cssText = 'display:none;';
