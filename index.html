  </style>
</head>

<!-- Módulos de Firebase para conectar a Realtime Database -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGmQuEXsFAdypuUPSxbLWQLyqwEjYXqRk",
    authDomain: "finanzasuneq.firebaseapp.com",
    databaseURL: "https://finanzasuneq-default-rtdb.firebaseio.com",
    projectId: "finanzasuneq",
    storageBucket: "finanzasuneq.firebasestorage.app",
    messagingSenderId: "437380582204",
    appId: "1:437380582204:web:0dd879f1ecc93074b6ac39",
    measurementId: "G-HTT52NHPNP"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Adaptador para usar Firebase como almacenamiento persistente
  window.storage = {
    async get(key) {
      try {
        const snapshot = await get(ref(db, key));
        if (snapshot.exists()) {
          return { value: JSON.stringify(snapshot.val()) };
        }
        return null;
      } catch (err) {
        console.error("Error al leer desde Firebase DB:", err);
        return null;
      }
    },
    async set(key, valueStr) {
      try {
        const parsed = JSON.parse(valueStr);
        await set(ref(db, key), parsed);
        return true;
      } catch (err) {
        console.error("Error al escribir en Firebase DB:", err);
        return false;
      }
    }
  };

  window.dispatchEvent(new Event('storage-ready'));
</script>

    function todayISO(){
      const d = new Date();
      const m = String(d.getMonth()+1).padStart(2,'0');
      const day = String(d.getDate()).padStart(2,'0');
      return `${d.getFullYear()}-${m}-${day}`;
    }

    function uid(prefix){
      return prefix + '_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,7);
    }

    function fmtMoney(n){
      const v = Math.round(Number(n)||0);
      const sign = v < 0 ? '-' : '';
      return sign + '$' + Math.abs(v).toLocaleString('es-CL');
    }

    function fmtMoneyC(n){
      const text = fmtMoney(n);
      return Number(n) < 0 ? `<span style="color:var(--expense)">${text}</span>` : text;
    }

    function fmtPct(n){
      if (!isFinite(n)) n = 0;
      return (n*100).toLocaleString('es-CL', {minimumFractionDigits:1, maximumFractionDigits:1}) + '%';
    }

    function fmtPctC(n){
      const text = fmtPct(n);
      return (isFinite(n) && n < 0) ? `<span style="color:var(--expense)">${text}</span>` : text;
    }

    function fmtDate(iso){
      if(!iso) return '';
      const [y,m,d] = iso.split('-');
      return `${d}-${m}-${y}`;
    }

    function escapeHtml(str){
      if (str === undefined || str === null) return '';
      return String(str).replace(/[&<>"']/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]));
    }

    function showToast(msg){
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(()=> toastEl.classList.remove('show'), 2800);
    }

    async function saveKey(key, value){
      try {
        const res = await window.storage.set(key, JSON.stringify(value));
        return res;
      } catch (e) {
        console.error(`Error guardando ${key}:`, e);
        showToast('Error de conexión con Firebase');
        return false;
      }
    }

    async function loadKeySeeded(key, seedValue){
      try {
        const res = await window.storage.get(key);
        if (res && res.value) {
          return JSON.parse(res.value);
        }
        await saveKey(key, seedValue);
        return seedValue;
      } catch (e) {
        return seedValue;
      }
    }

    async function init(){
      try {
        const config = await loadKeySeeded('config', SEED_CONFIG);
        const ingresos = await loadKeySeeded('ingresos', []);
        const gastos = await loadKeySeeded('gastos', []);
        const pagosFijosCatalogo = await loadKeySeeded('pagosFijosCatalogo', []);
        const pagosFijosEstado = await loadKeySeeded('pagosFijosEstado', {});

        state.config = config || SEED_CONFIG;
        state.ingresos = ingresos || [];
        state.gastos = gastos || [];
        state.pagosFijosCatalogo = pagosFijosCatalogo || [];
        state.pagosFijosEstado = pagosFijosEstado || {};
        state.loading = false;
      } catch (e) {
        console.error(e);
        state.error = 'No se pudieron cargar tus datos desde Firebase.';
        state.loading = false;
      }
      render();
    }

    function getSaldoActual(){
      const ingresosPagados = state.ingresos.filter(i=>i.estado==='Pagado').reduce((s,i)=>s+(Number(i.monto)||0),0);
      const totalGastos = state.gastos.reduce((s,g)=>s+(Number(g.monto)||0),0);
      return (Number(state.config.saldoInicial)||0) + ingresosPagados - totalGastos;
    }

    function render(){
      if(state.loading){
        root.innerHTML = `<div class="fa-loading">Cargando tus datos financieros desde Firebase…</div>`;
        return;
      }
      if(state.error){
        root.innerHTML = `<div class="fa-error">${escapeHtml(state.error)}</div>`;
        return;
      }
      root.innerHTML = `
        <div class="fa-sidebar">
          <div class="fa-brand"><span class="dot"></span> Finanzas UNEQ</div>
          <button class="fa-nav-btn ${state.activeTab==='resumen'?'active':''}" onclick="setTab('resumen')"><span class="fa-nav-icon">&#9673;</span> Resumen</button>
          <button class="fa-nav-btn ${state.activeTab==='ingresos'?'active':''}" onclick="setTab('ingresos')"><span class="fa-nav-icon">&#8593;</span> Ingresos</button>
          <button class="fa-nav-btn ${state.activeTab==='gastos'?'active':''}" onclick="setTab('gastos')"><span class="fa-nav-icon">&#8595;</span> Gastos</button>
          <button class="fa-nav-btn ${state.activeTab==='pagosfijos'?'active':''}" onclick="setTab('pagosfijos')"><span class="fa-nav-icon">&#8987;</span> Pagos Fijos</button>
          <button class="fa-nav-btn ${state.activeTab==='flujo'?'active':''}" onclick="setTab('flujo')"><span class="fa-nav-icon">&#8646;</span> Flujo de Caja</button>
          <button class="fa-nav-btn ${state.activeTab==='rentabilidad'?'active':''}" onclick="setTab('rentabilidad')"><span class="fa-nav-icon">&#9636;</span> Rentabilidad</button>
          <div class="fa-sidebar-footer">Sincronizado con Firebase</div>
        </div>
        <div class="fa-main">
          ${renderTabContent()}
        </div>
      `;
    }

    function renderTabContent(){
      const delAnioIngresos = state.ingresos.filter(i=> i.fecha && new Date(i.fecha+'T00:00:00').getFullYear()===state.config.anio);
      const delAnioGastos = state.gastos.filter(g=> g.fecha && new Date(g.fecha+'T00:00:00').getFullYear()===state.config.anio);

      if(state.activeTab === 'resumen'){
        const totalIngresos = delAnioIngresos.reduce((s,i)=>s+(Number(i.monto)||0),0);
        const totalGastos = delAnioGastos.reduce((s,g)=>s+(Number(g.monto)||0),0);
        const utilidad = totalIngresos - totalGastos;

        return `
          <div class="fa-topbar"><h1>Resumen Financiero (${state.config.anio})</h1></div>
          <div class="fa-kpi-grid">
            <div class="fa-kpi income"><div class="fa-kpi-label">Ingresos del año</div><div class="fa-kpi-value income money">${fmtMoneyC(totalIngresos)}</div></div>
            <div class="fa-kpi expense"><div class="fa-kpi-label">Gastos del año</div><div class="fa-kpi-value expense money">${fmtMoneyC(totalGastos)}</div></div>
            <div class="fa-kpi"><div class="fa-kpi-label">Utilidad Neta</div><div class="fa-kpi-value money">${fmtMoneyC(utilidad)}</div></div>
            <div class="fa-kpi"><div class="fa-kpi-label">Saldo Caja Actual</div><div class="fa-kpi-value money">${fmtMoneyC(getSaldoActual())}</div></div>
          </div>
          <div class="fa-card">
            <h3>Estado del Sistema</h3>
            <p>Conexión exitosa a tu base de datos Firebase.</p>
            <p>Registros almacenados: <strong>${state.ingresos.length} ingresos</strong> | <strong>${state.gastos.length} gastos</strong>.</p>
          </div>
        `;
      }

      if(state.activeTab === 'ingresos'){
        return `
          <div class="fa-topbar"><h1>Ingresos (${delAnioIngresos.length})</h1></div>
          <div class="fa-card">
            <h3>Agregar Nuevo Ingreso</h3>
            <form id="form-ingreso" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
              <input type="date" id="ing-fecha" value="${todayISO()}" required>
              <input type="text" id="ing-cliente" placeholder="Cliente" required>
              <input type="text" id="ing-desc" placeholder="Descripción">
              <input type="number" id="ing-monto" placeholder="Monto ($)" required>
              <button type="submit" class="fa-btn fa-btn-primary">Guardar Ingreso</button>
            </form>
          </div>
          <div class="fa-card">
            <table class="fa-table">
              <thead><tr><th>Fecha</th><th>Cliente</th><th>Descripción</th><th>Monto</th><th>Estado</th></tr></thead>
              <tbody>
                ${delAnioIngresos.map(i=>`
                  <tr class="income-row">
                    <td>${fmtDate(i.fecha)}</td>
                    <td>${escapeHtml(i.cliente)}</td>
                    <td>${escapeHtml(i.descripcion)}</td>
                    <td class="num money">${fmtMoneyC(i.monto)}</td>
                    <td><span class="fa-badge pagado">${i.estado||'Pagado'}</span></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      if(state.activeTab === 'gastos'){
        return `
          <div class="fa-topbar"><h1>Gastos (${delAnioGastos.length})</h1></div>
          <div class="fa-card">
            <h3>Agregar Nuevo Gasto</h3>
            <form id="form-gasto" style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">
              <input type="date" id="gas-fecha" value="${todayISO()}" required>
              <input type="text" id="gas-prov" placeholder="Proveedor" required>
              <input type="text" id="gas-desc" placeholder="Descripción">
              <input type="number" id="gas-monto" placeholder="Monto ($)" required>
              <button type="submit" class="fa-btn fa-btn-primary">Guardar Gasto</button>
            </form>
          </div>
          <div class="fa-card">
            <table class="fa-table">
              <thead><tr><th>Fecha</th><th>Proveedor</th><th>Descripción</th><th>Monto</th></tr></thead>
              <tbody>
                ${delAnioGastos.map(g=>`
                  <tr class="expense-row">
                    <td>${fmtDate(g.fecha)}</td>
                    <td>${escapeHtml(g.proveedor)}</td>
                    <td>${escapeHtml(g.descripcion)}</td>
                    <td class="num money">${fmtMoneyC(g.monto)}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      return `<div class="fa-card"><h3>Sección en construcción</h3></div>`;
    }

    window.setTab = function(t){ state.activeTab = t; render(); };

    root.addEventListener('submit', async (e)=>{
      if(e.target.id === 'form-ingreso'){
        e.preventDefault();
        const nuevo = {
          id: uid('ing'),
          fecha: document.getElementById('ing-fecha').value,
          cliente: document.getElementById('ing-cliente').value,
          descripcion: document.getElementById('ing-desc').value,
          monto: Number(document.getElementById('ing-monto').value)||0,
          estado: 'Pagado',
          categoria: 'Venta Programas Online (CLP)'
        };
        state.ingresos.push(nuevo);
        await saveKey('ingresos', state.ingresos);
        showToast('Ingreso guardado en Firebase');
        render();
      }
      if(e.target.id === 'form-gasto'){
        e.preventDefault();
        const nuevo = {
          id: uid('gas'),
          fecha: document.getElementById('gas-fecha').value,
          proveedor: document.getElementById('gas-prov').value,
          descripcion: document.getElementById('gas-desc').value,
          monto: Number(document.getElementById('gas-monto').value)||0,
          categoria: 'Otros Gastos'
        };
        state.gastos.push(nuevo);
        await saveKey('gastos', state.gastos);
        showToast('Gasto guardado en Firebase');
        render();
      }
    });

    init();
  })();
});
</script>
</body>
</html>
